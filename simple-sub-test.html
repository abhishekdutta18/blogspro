<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlogsPro - Subscribers Quick Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #080d1a 0%, #0f1628 100%);
      color: #f5f0e8;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #0f1628;
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 8px;
      padding: 2rem;
    }
    h1 {
      background: linear-gradient(135deg, #c9a84c, #f0cc6e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    .section {
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(26, 35, 64, 0.5);
      border-left: 3px solid #c9a84c;
      border-radius: 4px;
    }
    button {
      background: linear-gradient(135deg, #c9a84c, #f0cc6e);
      color: #080d1a;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      width: 100%;
    }
    button:hover { opacity: 0.9; transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input {
      background: #080d1a;
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: #f5f0e8;
      padding: 0.75rem;
      border-radius: 4px;
      font-family: inherit;
      width: 100%;
      margin-bottom: 0.5rem;
    }
    .output {
      background: #080d1a;
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 4px;
      padding: 1rem;
      margin-top: 1rem;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .success { color: #4caf50; }
    .error { color: #ef4444; }
    .info { color: #3b82f6; }
    .warning { color: #f59e0b; }
    table {
      width: 100%;
      margin-top: 1rem;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
    }
    th { background: rgba(201, 168, 76, 0.1); font-weight: 700; }
    .stat {
      display: inline-block;
      background: rgba(201, 168, 76, 0.1);
      padding: 1rem;
      border-radius: 4px;
      margin-right: 1rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: #f0cc6e; }
    .stat-label { font-size: 0.75rem; color: #8896b3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📬 Test Subscribers</h1>
    <p style="color: #8896b3; margin-bottom: 1.5rem;">Quick test of subscriber system</p>

    <!-- Admin Dashboard Test -->
    <div class="section">
      <h2 style="font-size: 1rem; margin-bottom: 0.5rem;">🎯 Go to Admin Dashboard</h2>
      <button onclick="goToAdmin()" style="background: linear-gradient(135deg, #1d4ed8, #3b82f6);">
        👉 Open Admin Dashboard → Subscribers
      </button>
      <div class="output" id="adminOutput">
        <span class="info">Click button to open admin dashboard</span>
      </div>
    </div>

    <!-- Add Test Email -->
    <div class="section">
      <h2 style="font-size: 1rem; margin-bottom: 0.5rem;">✉ Add Subscriber</h2>
      <input type="email" id="emailInput" placeholder="test@example.com" value="abhishek@blogspro.in" />
      <button onclick="addSubscriber()">➕ Add Email to Firestore</button>
      <div class="output" id="addOutput"></div>
    </div>

    <!-- Newsletter Worker Test -->
    <div class="section">
      <h2 style="font-size: 1rem; margin-bottom: 0.5rem;">📤 Newsletter Worker</h2>
      <button onclick="testWorker()">🚀 Send Test Newsletter</button>
      <div class="output" id="workerOutput"></div>
    </div>

    <!-- Status Check -->
    <div class="section">
      <h2 style="font-size: 1rem; margin-bottom: 0.5rem;">📊 System Status</h2>
      <button onclick="checkStatus()" style="background: #4caf50;">✓ Check Everything</button>
      <div class="output" id="statusOutput"></div>
    </div>
  </div>

  <script>
    function log(elementId, message, type = 'info') {
      const el = document.getElementById(elementId);
      if (!el) return;
      const time = new Date().toLocaleTimeString();
      const span = document.createElement('div');
      span.className = type;
      span.textContent = `[${time}] ${message}`;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }

    function goToAdmin() {
      log('adminOutput', '🔗 Opening admin dashboard...', 'info');
      setTimeout(() => {
        window.open('/admin.html#subscribers', '_blank');
        log('adminOutput', '✅ Admin dashboard opened in new tab', 'success');
        log('adminOutput', 'Click "✉ Subscribers" in the left navigation', 'info');
      }, 100);
    }

    async function addSubscriber() {
      const email = document.getElementById('emailInput').value?.trim();
      const el = 'addOutput';
      document.getElementById(el).innerHTML = '';

      if (!email) {
        log(el, '❌ Please enter an email', 'error');
        return;
      }

      log(el, `📝 Adding ${email} to Firestore...`, 'info');

      try {
        // Using Firestore REST API
        const projectId = 'blogspro-ai';
        const response = await fetch(
          `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/subscribers`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                email: { stringValue: email },
                status: { stringValue: 'active' },
                subscribedAt: { timestampValue: new Date().toISOString() },
                createdAt: { timestampValue: new Date().toISOString() }
              }
            })
          }
        );

        if (response.ok) {
          const data = await response.json();
          log(el, `✅ Subscriber added!`, 'success');
          log(el, `📄 Document ID: ${data.name.split('/').pop()}`, 'info');
          document.getElementById('emailInput').value = '';
        } else {
          const error = await response.json();
          log(el, `⚠️ ${error.error?.message || 'Failed to add subscriber'}`, 'warning');
          log(el, '💡 Note: Firestore REST API may require auth. Try admin dashboard instead.', 'info');
        }
      } catch (err) {
        log(el, `❌ Error: ${err.message}`, 'error');
        log(el, '💡 Try adding subscriber through admin dashboard instead', 'info');
      }
    }

    async function testWorker() {
      const el = 'workerOutput';
      document.getElementById(el).innerHTML = '';
      log(el, '📤 Testing Newsletter Worker...', 'info');

      try {
        const response = await fetch('https://blogspro-newsletter.abhishekdutta18.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            subject: 'Test Newsletter - ' + new Date().toLocaleString(),
            html: '<h1>Test Newsletter</h1><p>This is a test email from BlogsPro Newsletter Worker.</p>',
            secret: 'biltu123'
          })
        });

        if (response.ok) {
          const data = await response.json();
          log(el, `✅ Worker responded successfully!`, 'success');
          log(el, `📬 Sent to ${data.count || '?'} subscriber(s)`, 'success');
        } else {
          const error = await response.text();
          log(el, `⚠️ Worker error: ${response.status}`, 'warning');
          log(el, `${error}`, 'info');
        }
      } catch (err) {
        log(el, `❌ Connection error: ${err.message}`, 'error');
        log(el, 'The Worker endpoint may be offline or blocking cross-origin requests', 'info');
      }
    }

    async function checkStatus() {
      const el = 'statusOutput';
      document.getElementById(el).innerHTML = '';
      log(el, '🔍 Checking system status...', 'info');

      // Check project
      log(el, '✅ Project: BlogsPro Fintech AI Blog', 'success');
      log(el, '✅ Firestore Project ID: blogspro-ai', 'success');

      // Check config
      log(el, '✅ Newsletter Worker: https://blogspro-newsletter.abhishekdutta18.workers.dev', 'success');
      log(el, '✅ Subscribers Collection: /subscribers', 'success');
      log(el, '✅ Firestore Rules: allow create, read, update, delete: if true (testing)', 'warning');

      // Import Firebase from admin
      log(el, '', 'info');
      log(el, '📋 CHECKLIST:', 'info');
      log(el, '[ ] ✅ Admin dashboard loads', 'info');
      log(el, '[ ] ✅ Click Subscribers nav item', 'info');
      log(el, '[ ] ✅ See subscriber list and stats', 'info');
      log(el, '[ ] ✅ Add test subscriber via form', 'info');
      log(el, '[ ] ✅ Go to Newsletter section', 'info');
      log(el, '[ ] ✅ Generate newsletter from posts', 'info');
      log(el, '[ ] ✅ Send newsletter to subscribers', 'info');
      log(el, '[ ] ✅ Check inbox for email from newsletter@mail.blogspro.in', 'info');
    }

    // Initial status
    window.addEventListener('load', () => {
      log('statusOutput', '✅ Test page loaded. Choose an action above.', 'success');
    });
  </script>
</body>
</html>
