# BlogsPro 5.0 - MiroSync Strategic Bridge (Durable Object Home)
# ============================================================

name = "blogspro-miro-sync"
main = "scripts/miro-sync-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

[[durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSyncS"

[[durable_objects.bindings]]
name = "INGESTOR_DO"
class_name = "DataIngestorS"

[[durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregatorS"

# --- STRATEGIC MIGRATIONS (V5.4.2) ---
[[migrations]]
tag = "v5_4_2_k_final_purge"
deleted_classes = ["MiroSync", "DataIngestor", "ManuscriptAggregator"]
new_sqlite_classes = ["MiroSyncS", "DataIngestorS", "ManuscriptAggregatorS"]
