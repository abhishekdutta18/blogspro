# [V1.0] BlogsPro Weekly Swarm Tome - Institutional Strategic Synthesis
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-swarm-tome
  namespace: blogspro
spec:
  schedule: "0 0 * * 1" # Every Monday at 00:00 UTC
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: swarm-engine
            image: us-central1-docker.pkg.dev/blogspro-ai/blogspro-repo/swarm-engine:latest # Updated to Artifact Registry
            args:
            - "node"
            - "scripts/generate-institutional-tome.js"
            - "--freq=weekly"
            - "--type=article"
            - "--extended"
            envFrom:
            - secretRef:
                name: blogspro-secrets
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "2"
                memory: "4Gi"
          restartPolicy: OnFailure
