apiVersion: batch/v1
kind: CronJob
metadata:
  name: blogspro-daily-sovereign
  namespace: blogspro
spec:
  schedule: "0 9 * * *" # Daily at 9:00 AM IST
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: blogspro-sa
          containers:
          - name: sovereign-dispatch
            image: gcr.io/blogspro-ai/swarm-orchestrator:latest
            command: ["/bin/sh", "-c", "npm run ecc:governance && node scripts/lib/swarm-orchestrator.js --mode=daily"]
            envFrom:
            - secretRef:
                name: blogspro-secrets
          restartPolicy: OnFailure
---
