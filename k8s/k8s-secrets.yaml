# [V1.0] BlogsPro Institutional Secret Vault
# USAGE: 
# 1. Fill in the base64 encoded values below
# 2. kubectl apply -f k8s-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: blogspro-secrets
  namespace: blogspro
type: Opaque
data:
  # AI API Keys (Base64 Encoded)
  GEMINI_API_KEY: ""
  GROQ_API_KEY: ""
  MISTRAL_API_KEY: ""
  OPENROUTER_API_KEY: ""
  CEREBRAS_API_KEY: ""
  SAMBANOVA_API_KEY: ""
  HF_TOKEN: ""
  QWEB_API_KEY: ""

  # Cloud Infrastructure
  FIREBASE_PROJECT_ID: ""
  FIREBASE_STORAGE_BUCKET: ""
  FIREBASE_SERVICE_ACCOUNT: "" # The entire JSON string, base64 encoded
  GCS_BUCKET_NAME: ""
  CLOUDFLARE_ACCOUNT_ID: ""
  CLOUDFLARE_API_KEY: ""
  CLOUDFLARE_EMAIL: ""

  # Telemetry & Notifications
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  SENTRY_DSN: ""

  # Institutional Secrets
  SWARM_INTERNAL_TOKEN: ""
  INSTITUTIONAL_MASTER_SECRET: ""
  VAULT_MASTER_KEY: ""

  # FinTech (Optional)
  UPSTOX_ACCESS_TOKEN: ""
