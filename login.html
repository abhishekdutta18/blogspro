<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BlogsPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --navy:   #080d1a;
      --navy2:  #0f1628;
      --navy3:  #1a2340;
      --gold:   #c9a84c;
      --gold2:  #f0cc6e;
      --cream:  #f5f0e8;
      --muted:  #8896b3;
      --border: rgba(201,168,76,0.2);
      --red:    #ef4444;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }
 
    body {
      background: var(--navy);
      color: var(--cream);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
 
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(37,99,235,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
 
    .login-box {
      background: var(--navy2);
      border: 1px solid var(--border);
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      position: relative;
      animation: slideUp 0.4s ease both;
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    }
 
    .login-brand {
      font-family: var(--serif);
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
 
    .login-subtitle {
      font-size: 0.78rem; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
 
    /* Social buttons */
    .social-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
      background: var(--navy3);
      color: var(--cream);
    }
 
    .social-btn:hover {
      background: var(--navy);
      border-color: rgba(201,168,76,0.5);
      transform: translateY(-1px);
    }
 
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .social-btn svg { flex-shrink: 0; }
 
    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
    }
 
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
 
    .divider span {
      font-size: 0.72rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap;
    }
 
    /* Form */
    .form-group { margin-bottom: 1.2rem; }
 
    label {
      display: block;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.45rem;
    }
 
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-family: var(--sans); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
 
    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }
 
    .btn-login {
      width: 100%;
      background: var(--gold); color: var(--navy);
      border: none; padding: 1rem;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
 
    .btn-login:hover {
      background: var(--gold2);
      box-shadow: 0 6px 20px rgba(201,168,76,0.3);
    }
 
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
 
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 3px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
 
    .back-link {
      display: block; text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem; color: var(--muted);
      transition: color 0.2s;
    }
 
    .back-link:hover { color: var(--gold); }
 
    .loading-ring {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
 
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- Consolidated Sentry Configuration -->
  <script src="js/sentry-init-v2.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DED9GTRR3E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DED9GTRR3E');
  </script>
  <!-- Microsoft Clarity -->
  <script src="js/clarity-init.js"></script>
</head>
<body>
 
<div class="login-box">
  <div class="login-brand"><img src="logo.svg" alt="BlogsPro" height="32" style="display:block;height:32px;width:auto;margin:0 auto"></div>
  <div class="login-subtitle">Admin Access</div>
 
  <!-- Google (Direct Handshake) -->
  <div id="googleBtn" style="margin-bottom: 1.2rem; min-height: 44px; display: flex; justify-content: center;"></div>
 
  <!-- GitHub -->
  <button class="social-btn" id="githubBtn" onclick="signInGitHub()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--cream)">
      <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
    </svg>
    Continue with GitHub
    <div class="loading-ring" id="githubRing"></div>
  </button>
 
  <!-- Divider -->
  <div class="divider"><span>or sign in with email</span></div>
 
  <!-- Email / Password -->
  <form id="loginForm" method="POST" onsubmit="doLogin(); return false;" autocomplete="on">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="admin@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" type="submit">
      <span id="btnText">Sign In</span>
      <div class="loading-ring" id="emailRing" style="border-top-color:var(--navy);border-color:rgba(8,13,26,0.3)"></div>
    </button>
  </form>
 
  <div class="error-msg" id="errorMsg"></div>
  <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--muted)">
    Don't have an account? <a href="register.html" style="color:var(--gold)">Register →</a>
  </p>
  <a class="back-link" href="index.html">← Back to blog</a>
</div>
 
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GithubAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { api } from "./js/services/api.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
    authDomain: "blogspro-ai.firebaseapp.com",
    projectId: "blogspro-ai",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 1. Initial State & Google Direct Handshake
  const urlParams = new URLSearchParams(window.location.search);
  const errorParam = urlParams.get('error');
  const reasonParam = urlParams.get('reason');
  const tokenParam  = urlParams.get('token');
  
  // 1. Bearer Token Bridge: Capture token from URL (Redirect Flow)
  if (tokenParam) {
    console.log("[Institutional Bridge] Capturing session token from redirect...");
    localStorage.setItem("fb_token", tokenParam);
    // Redirect to admin immediately to complete the handshake
    window.location.href = "admin.html";
  }

  // Google Direct Handshake Initialization
  window.addEventListener('load', async () => {
    // 1. Check for Pending GitHub/Firebase Redirects (Legacy Fallback)
    try {
      const result = await getRedirectResult(auth);
      if (result) await handleAuthSuccess(result.user);
    } catch (e) {
      console.error("Redirect auth error:", e);
    }

    // 2. Initialize GSI (Resilient Proxy Handshake)
    if (window.google) {
      google.accounts.id.initialize({
        client_id: "940428277283-bdgk8sf3d0q7jls327e0j8cce5l9a78q.apps.googleusercontent.com",
        login_uri: "https://blogspro-auth.abhishek-dutta1996.workers.dev/auth/callback/google",
        ux_mode: "redirect",
        auto_select: false
      });
      
      // Render Branded Button
      google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        { theme: "filled_blue", size: "large", width: 370 }
      );

      // Trigger One Tap Overlay
      google.accounts.id.prompt();
    }
  });

  if (errorParam === 'unauthorized') {
    let msg = 'Unauthorized: Admin privileges required to access the dashboard.';
    if (reasonParam === 'reader' || reasonParam === 'user') {
      msg = `Access Denied: Your account role is '${reasonParam}'. Only admins can access this area.`;
    } else if (reasonParam === 'missing_role') {
      msg = 'Access Denied: Your account has no role assigned. Please contact the system administrator.';
    } else if (reasonParam === 'permission-denied') {
      msg = 'Security Error: You do not have permission to verify your role. Please sign out and sign in again.';
    }
    showError(msg);
  }

  async function handleAuthSuccess(user) {
    const idToken = await user.getIdToken();
    localStorage.setItem("fb_token", idToken);
    
    // Verify role on worker
    const me = await api.auth.me();
    if (me?.authenticated && me.user?.role === "admin") {
      window.location.href = "admin.html";
    } else {
      const role = me.user?.role || "missing_role";
      window.location.href = `login.html?error=unauthorized&reason=${encodeURIComponent(role)}`;
    }
  }

  async function redirectIfAuthenticated() {
    try {
      const me = await api.auth.me();
      if (me?.authenticated && me.user?.role === "admin") {
        window.location.href = "admin.html";
      }
    } catch (_) {}
  }
  redirectIfAuthenticated();

  // 2. Auth Handlers
  window.signInGitHub = async () => {
    setLoading('github', true);
    try {
      const provider = new GithubAuthProvider();
      await signInWithRedirect(auth, provider);
      // signInWithRedirect navigates away; if we reach here the browser blocked it
      setLoading('github', false);
    } catch (e) {
      showError(e.message || "GitHub Sign-in failed.");
      setLoading('github', false);
    }
  };

  window.doLogin = async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) { showError('Please enter your email and password.'); return; }
    setLoading('email', true); hideError();
    try {
      await api.auth.login(email, pass);
      const me = await api.auth.me();
      if (me?.authenticated && me.user?.role === "admin") {
        window.location.href = "admin.html";
      } else {
        showError("Access Denied: Admin role required.");
        setLoading('email', false);
      }
    } catch (e) {
      showError(e.message || "Sign-in failed.");
      setLoading('email', false);
    }
  };

  // 3. UI Helpers
  function setLoading(provider, on) {
    const map = {
      github: { btn: 'githubBtn', ring: 'githubRing' },
      email:  { btn: 'loginBtn',  ring: 'emailRing', txt: 'btnText' },
    };
    const { btn, ring, txt } = map[provider];
    const button = document.getElementById(btn);
    if (!button) return;
    button.disabled = on;
    const ringEl = document.getElementById(ring);
    if (ringEl) ringEl.style.display = on ? 'block' : 'none';
    if (txt) {
      const txtEl = document.getElementById(txt);
      if (txtEl) txtEl.style.display = on ? 'none' : 'inline';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }

  function hideError() {
    const el = document.getElementById('errorMsg');
    if (el) el.style.display = 'none';
  }

  document.getElementById('loginForm').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      window.doLogin();
    }
  });
</script>
</body>
</html>
