<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BlogsPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #080d1a;
      --navy2:  #0f1628;
      --navy3:  #1a2340;
      --gold:   #c9a84c;
      --gold2:  #f0cc6e;
      --cream:  #f5f0e8;
      --muted:  #8896b3;
      --border: rgba(201,168,76,0.2);
      --red:    #ef4444;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(37,99,235,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-box {
      background: var(--navy2);
      border: 1px solid var(--border);
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      position: relative;
      animation: slideUp 0.4s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    }

    .login-brand {
      font-family: var(--serif);
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .login-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .form-group { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 1rem;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: var(--gold2);
      box-shadow: 0 6px 20px rgba(201,168,76,0.3);
    }

    .btn-login:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 3px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }

    .loading-ring {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(8,13,26,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-brand">BlogsPro</div>
  <div class="login-subtitle">Admin Access</div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span id="btnText">Sign In</span>
    <div class="loading-ring" id="loadingRing"></div>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <a class="back-link" href="index.html">← Back to blog</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
  authDomain: "blogspro-ai.firebaseapp.com",
  projectId: "blogspro-ai",
  storageBucket: "blogspro-ai.firebasestorage.app",
  messagingSenderId: "940428277283",
  appId: "1:940428277283:web:d3bb414f0992718ca76396",
  measurementId: "G-N7TCB31MRD"
};

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in, redirect to admin
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'admin.html';
  });

  window.doLogin = async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const btn   = document.getElementById('loginBtn');
    const ring  = document.getElementById('loadingRing');
    const txt   = document.getElementById('btnText');
    const err   = document.getElementById('errorMsg');

    if (!email || !pass) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    txt.style.display = 'none';
    ring.style.display = 'block';
    err.style.display  = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = 'admin.html';
    } catch(e) {
      const msgs = {
        'auth/user-not-found':  'No account found with this email.',
        'auth/wrong-password':  'Incorrect password.',
        'auth/invalid-email':   'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try later.',
      };
      showError(msgs[e.code] || 'Login failed. Please try again.');
      btn.disabled = false;
      txt.style.display = 'block';
      ring.style.display = 'none';
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
</script>
</body>
</html>
