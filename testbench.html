<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Tracer — BlogsPro Test Bench</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

  <style>
    :root {
      --bg: #080d1a;
      --card-bg: rgba(13, 19, 36, 0.7);
      --border: rgba(201, 168, 76, 0.15);
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.3);
      --emerald: #10b981;
      --blue: #3b82f6;
      --cream: #f4f4f5;
      --muted: #a1a1aa;
      --mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(201, 168, 76, 0.05) 0%, transparent 40%);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* AUTH SHIELD */
    #authShield {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
    }
    .shield-icon { font-size: 3rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* HEADER */
    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand img { height: 24px; }
    .brand h1 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold); }
    .status-pill { font-size: 0.7rem; font-weight: 700; background: rgba(16, 185, 129, 0.1); color: var(--emerald); padding: 0.2rem 0.6rem; border-radius: 99px; border: 1px solid rgba(16, 185, 129, 0.3); }

    /* MAIN LAYOUT */
    main {
      flex: 1;
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* TRACER TERMINAL (Left) */
    .tracer-pane {
      flex: 1.2;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .pane-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .pane-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    #tracerBody {
      flex: 1;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.6;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }
    .trace-entry { margin-bottom: 0.4rem; animation: slideIn 0.2s ease-out; }
    .trace-ts { color: var(--gold); opacity: 0.7; margin-right: 0.6rem; }
    .trace-msg { color: var(--cream); }
    .trace-event { font-weight: 700; color: var(--emerald); margin-right: 0.4rem; padding: 0 4px; background: rgba(16, 185, 129, 0.1); border-radius: 2px; }

    /* AUDIT LAB (Right) */
    .lab-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
    }
    .lab-input-group { display: flex; flex-direction: column; gap: 0.75rem; }
    .label { font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
    textarea {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--cream);
      padding: 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--gold); }
    .lab-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    select, button {
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    select { background: var(--bg); border: 1px solid var(--border); color: var(--cream); }
    .btn-audit {
      background: linear-gradient(135deg, var(--gold), #eab308);
      border: none;
      color: var(--bg);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn-audit:active { transform: scale(0.98); }
    .btn-audit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* RESULT VIEWER */
    #auditResult {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--cream);
    }
    #auditResult h1, #auditResult h2, #auditResult h3 { color: var(--gold); margin: 1rem 0 0.5rem; }
    #auditResult strong { color: var(--emerald); }
    #auditResult blockquote { border-left: 3px solid var(--gold); padding-left: 1rem; margin: 1rem 0; color: var(--muted); }

    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    /* TOAST */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: 1rem 2rem; border-radius: 8px;
      background: var(--card-bg); border: 1px solid var(--border);
      backdrop-filter: blur(12px); transform: translateY(100px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
    }
    #toast.show { transform: translateY(0); }
  </style>
</head>
<body>

  <div id="authShield">
    <div class="shield-icon">🛡️</div>
    <p style="font-weight: 600; letter-spacing: 0.1em;">AUTHENTICATING INSTITUTIONAL NODE...</p>
  </div>

  <header>
    <div class="brand">
      <img src="logo-crop.png" alt="BlogsPro">
      <h1>Intelligence Tracer</h1>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span class="status-pill" id="nodeStatus">NODE: ALIGNED</span>
      <button onclick="location.reload()" style="background: transparent; border: 1px solid var(--border); color: var(--gold); padding: 4px 12px; font-size: 0.7rem;">⟳ SYNC</button>
    </div>
  </header>

  <main>
    <!-- LEFT: TRACER -->
    <div class="tracer-pane">
      <div class="pane-header">
        <div class="pane-title">🛰 Live Swarm Telemetry</div>
        <div style="font-size: 0.65rem; color: var(--muted);" id="tracerCount">0 EVENTS IN BUFFER</div>
      </div>
      <div id="tracerBody">
        <div class="trace-entry"><span class="trace-ts">[INIT]</span> <span class="trace-msg">Starting high-fidelity telemetry stream...</span></div>
      </div>
    </div>

    <!-- RIGHT: LAB -->
    <div class="lab-pane">
      <div class="glass-card">
        <div class="lab-input-group">
          <label class="label">Text Audit Lab</label>
          <textarea id="sampleText" rows="6" placeholder="Paste sample text for institutional audit..."></textarea>
          
          <div class="lab-controls">
            <select id="modelSelect">
              <optgroup label="Contemporary Lineage">
                <option value="llama-3.1-405b-instruct">Llama 3.1 405B (SambaNova)</option>
                <option value="meta-llama-4-70b-instruct">Llama 4.0 70B (High Density)</option>
              </optgroup>
              <optgroup label="Fast Deployment">
                <option value="llama-3.1-70b-versatile">Llama 3.1 70B (Groq)</option>
                <option value="llama-4-70b">Cerebras Llama-4 Node</option>
              </optgroup>
            </select>
            <button class="btn-audit" id="auditBtn" onclick="runAudit()">✦ RUN AUDIT</button>
          </div>
        </div>
      </div>

      <div class="glass-card" style="flex: 1; display: flex; flex-direction: column;">
        <div class="pane-header" style="padding: 0 0 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
          <div class="pane-title">Institutional Feedback</div>
        </div>
        <div id="auditResult">
          <p style="color: var(--muted); font-style: italic; text-align: center; margin-top: 4rem;">Results will appear after audit process completes.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script type="module">
    import { api } from './js/services/api.js';

    // 1. AUTH GUARD
    async function checkAuth() {
      try {
        const res = await api.auth.me();
        if (!res.authenticated || res.user.role !== 'admin') {
          window.location.href = 'login.html?error=unauthorized';
          return;
        }
        document.getElementById('authShield').style.display = 'none';
        initTracer();
      } catch (e) {
        window.location.href = 'login.html?error=auth_connection_failed';
      }
    }
    checkAuth();

    // 2. TRACER SYSTEM
    let logBuffer = [];
    async function initTracer() {
      const fetchLogs = async () => {
        try {
          const res = await api.testbench.tracer();
          if (res.logs) {
            updateTracerUI(res.logs);
          }
        } catch (e) {
          console.warn("Tracer bridge stalled:", e.message);
        }
      };
      
      fetchLogs();
      setInterval(fetchLogs, 5000); // Polling for real-time telemetry
    }

    function updateTracerUI(logs) {
      const tracerBody = document.getElementById('tracerBody');
      const countEl = document.getElementById('tracerCount');
      
      // Filter for new logs only
      const existing = logBuffer.map(l => l.timestamp);
      const newLogs = logs.filter(l => !existing.includes(l.timestamp)).reverse();
      
      if (newLogs.length === 0) return;
      
      newLogs.forEach(log => {
        const entry = document.createElement('div');
        entry.className = 'trace-entry';
        const ts = new Date(log.timestamp).toLocaleTimeString();
        entry.innerHTML = `
          <span class="trace-ts">[${ts}]</span>
          <span class="trace-event">${log.event || 'NODE'}</span>
          <span class="trace-msg">${log.message}</span>
        `;
        tracerBody.prepend(entry);
        logBuffer.push(log);
      });
      
      countEl.innerText = `${logBuffer.length} EVENTS IN BUFFER`;
    }

    // 3. AUDIT LAB SYSTEM
    window.runAudit = async () => {
      const text = document.getElementById('sampleText').value;
      const model = document.getElementById('modelSelect').value;
      const btn = document.getElementById('auditBtn');
      const resultEl = document.getElementById('auditResult');

      if (!text) {
        showToast("Please provide sample text for validation.", "error");
        return;
      }

      btn.disabled = true;
      btn.innerText = "◈ AUDITING...";
      resultEl.innerHTML = `<div style="text-align:center; padding: 4rem;"><div class="shield-icon" style="font-size:2rem; margin-bottom:1rem">🛰️</div><p style="color:var(--gold)">Institutional Node: Processing Analysis...</p></div>`;

      try {
        const res = await api.testbench.audit(text, model);
        if (res.success) {
          const cleanHtml = DOMPurify.sanitize(marked.parse(res.feedback));
          resultEl.innerHTML = cleanHtml;
          showToast("Diagnostic Complete: Feedback ingested.", "success");
        } else {
          throw new Error(res.error || "Audit failed");
        }
      } catch (e) {
        showToast(e.message, "error");
        resultEl.innerHTML = `<p style="color: #ef4444; padding: 2rem; border: 1px dashed #ef4444; border-radius: 8px;"><b>CRITICAL_FAILURE</b>: ${e.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.innerText = "✦ RUN AUDIT";
      }
    };

    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.borderColor = type === 'success' ? 'var(--emerald)' : (type === 'error' ? '#ef4444' : 'var(--border)');
      t.style.color = type === 'success' ? 'var(--emerald)' : (type === 'error' ? '#fca5a5' : 'var(--cream)');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
