<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Loading… — BlogsPro</title>
  <meta name="description" id="metaDesc" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --navy:   #080d1a;
      --navy2:  #0f1628;
      --navy3:  #1a2340;
      --gold:   #c9a84c;
      --gold2:  #f0cc6e;
      --cream:  #f5f0e8;
      --muted:  #8896b3;
      --border: rgba(201,168,76,0.2);
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }
 
    body {
      background: var(--navy);
      color: var(--cream);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
 
    a { color: inherit; text-decoration: none; }
 
    /* Progress bar */
    #progress {
      position: fixed; top: 0; left: 0; z-index: 200;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      width: 0%;
      transition: width 0.1s linear;
    }
 
    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,13,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
 
    .nav-brand {
      font-family: var(--serif);
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
 
    .back-link {
      font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
 
    .back-link:hover { color: var(--gold); }
 
    /* Article layout */
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }
 
    .article-meta-top {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem;
    }
 
    .article-cat {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem; border-radius: 2px;
    }
 
    .article-date {
      font-size: 0.78rem; color: var(--muted);
    }
 
    .article-read-time {
      font-size: 0.78rem; color: var(--muted);
    }
 
    h1.article-title {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
    }
 
    .article-excerpt {
      font-size: 1.2rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 2.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }
 
    /* Content styles */
    .article-content {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #d8d2c8;
    }
 
    .article-content h2 {
      font-family: var(--serif);
      font-size: 1.9rem; font-weight: 700;
      color: var(--cream);
      margin: 2.5rem 0 1rem;
    }
 
    .article-content h3 {
      font-family: var(--serif);
      font-size: 1.4rem; font-weight: 600;
      color: var(--cream);
      margin: 2rem 0 0.75rem;
    }
 
    .article-content p { margin-bottom: 1.5rem; }
 
    .article-content blockquote {
      border-left: 3px solid var(--gold);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 2rem 0;
      font-family: var(--serif);
      font-size: 1.35rem;
      font-style: italic;
      color: var(--cream);
      line-height: 1.5;
    }
 
    .article-content ul, .article-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1.5rem;
    }
 
    .article-content li { margin-bottom: 0.4rem; }
 
    .article-content a {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
 
    .article-content strong { color: var(--cream); font-weight: 600; }
 
    .article-content code {
      background: var(--navy3);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: 'Courier New', monospace;
      color: var(--gold2);
    }
 
    /* Share bar */
    .share-bar {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;
    }
 
    .share-label {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted);
    }
 
    .share-btn {
      background: var(--navy2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1rem;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
 
    .share-btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy);
    }
 
    /* Back to top */
    .back-top {
      margin-top: 3rem;
      display: flex; justify-content: center;
    }
 
    .back-top a {
      font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: color 0.2s;
    }
 
    .back-top a:hover { color: var(--gold); }
 
    /* Error state */
    .error-state {
      text-align: center;
      padding: 8rem 2rem;
      color: var(--muted);
    }
 
    .error-state h2 {
      font-family: var(--serif);
      font-size: 2rem; color: var(--cream);
      margin-bottom: 1rem;
    }
 
    @media (max-width: 600px) {
      .article-wrap { padding: 2rem 1.2rem 4rem; }
    }
  </style>
</head>
<body>
 
<div id="progress"></div>
 
<nav>
  <a class="nav-brand" href="index.html">BlogsPro</a>
  <a class="back-link" href="index.html">← All Articles</a>
</nav>
 
<div class="article-wrap" id="articleWrap">
  <p style="color:var(--muted);margin-top:4rem">Loading article…</p>
</div>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
    authDomain: "blogspro-ai.firebaseapp.com",
    projectId: "blogspro-ai",
    storageBucket: "blogspro-ai.firebasestorage.app",
    messagingSenderId: "940428277283",
    appId: "1:940428277283:web:d3bb414f0992718ca76396"
  };
 
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
 
  // Reading progress bar
  window.addEventListener('scroll', () => {
    const el    = document.documentElement;
    const pct   = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
    document.getElementById('progress').style.width = pct + '%';
  });
 
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
 
  if (!id) {
    renderError('No post found.');
  } else {
    loadPost(id);
  }
 
  async function loadPost(id) {
    try {
      const snap = await getDoc(doc(db, 'posts', id));
      if (!snap.exists()) { renderError('Post not found.'); return; }
      const p = snap.data();
 
      // Update meta
      document.getElementById('pageTitle').textContent = `${p.title} — BlogsPro`;
      document.getElementById('metaDesc').content = p.excerpt || '';
 
      const date = p.createdAt?.toDate?.()?.toLocaleDateString('en-IN', {
        day:'numeric', month:'long', year:'numeric'
      }) || '';
      const readTime = Math.max(1, Math.ceil((p.content || '').split(' ').length / 200));
 
      document.getElementById('articleWrap').innerHTML = `
        <div class="article-meta-top">
          <span class="article-cat">${p.category || 'General'}</span>
          <span class="article-date">${date}</span>
          <span class="article-read-time">${readTime} min read</span>
        </div>
        <h1 class="article-title">${p.title}</h1>
        ${p.excerpt ? `<p class="article-excerpt">${p.excerpt}</p>` : ''}
        <div class="article-content" id="articleContent">${p.content || ''}</div>
        <div class="share-bar">
          <span class="share-label">Share</span>
          <button class="share-btn" onclick="shareTwitter()">Twitter / X</button>
          <button class="share-btn" onclick="shareLinkedIn()">LinkedIn</button>
          <button class="share-btn" onclick="copyLink()">Copy Link</button>
        </div>
        <div class="back-top"><a href="#">↑ Back to top</a></div>
      `;
    } catch(err) {
      console.error('loadPost error:', err.code, err.message);
      if (err.code === 'permission-denied') {
        renderError('Access denied — your Firestore rules are blocking public reads. Update your rules in Firebase Console.');
      } else {
        renderError(`Failed to load this article. (${err.code || err.message})`);
      }
    }
  }
 
  function renderError(msg) {
    document.getElementById('articleWrap').innerHTML = `
      <div class="error-state">
        <h2>${msg}</h2>
        <a href="index.html" style="color:var(--gold)">← Back to all articles</a>
      </div>`;
  }
 
  window.shareTwitter = () => {
    const t = encodeURIComponent(document.title);
    const u = encodeURIComponent(window.location.href);
    window.open(`https://twitter.com/intent/tweet?text=${t}&url=${u}`,'_blank');
  };
 
  window.shareLinkedIn = () => {
    const u = encodeURIComponent(window.location.href);
    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${u}`,'_blank');
  };
 
  window.copyLink = async () => {
    await navigator.clipboard.writeText(window.location.href);
    alert('Link copied!');
  };
</script>
</body>
</html>
