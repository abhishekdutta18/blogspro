<script type="module">
  import { api } from "./js/services/api.js";

  const urlParams = new URLSearchParams(window.location.search);
  const postId = urlParams.get('id');

  // Progressive loading indicator
  window.addEventListener('scroll', () => {
    const el = document.documentElement;
    const progress = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
    document.getElementById('progress').style.width = Math.min(progress, 100) + '%';
  });

  async function init() {
    const main = document.getElementById('articleBody');
    if (!postId) {
      renderError("404: OBJECT_NOT_FOUND");
      return;
    }

    try {
      const post = await api.public.data('posts', postId);
      if (!post) {
        renderError("404: POST_NOT_IN_INDEX");
        return;
      }

      renderPost(post);
    } catch (err) {
      console.error('Post Load Error:', err);
      renderError("500: TELEMETRY_BRIDGE_FAILURE");
    }
  }

  function renderPost(p) {
    const main = document.getElementById('articleBody');
    const title = DOMPurify.sanitize(p.title || 'Untitled Pulse');
    const content = DOMPurify.sanitize(p.content || '');
    const category = DOMPurify.sanitize(p.category || 'General');
    const author = DOMPurify.sanitize(p.authorName || 'BlogsPro Intelligence');
    const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' }) : 'Unknown Date';
    
    const plainText = content.replace(/<[^>]+>/g, ' ').trim();
    const readTime = Math.max(1, Math.ceil(plainText.split(/\s+/).length / 200));

    // Update Metadata
    document.title = `${title} — BlogsPro`;
    document.getElementById('pageTitle').textContent = `${title} — BlogsPro`;

    main.innerHTML = `
      <header class="article-header">
        <span class="article-cat">${category}</span>
        <h1 class="article-title">${title}</h1>
        <div class="article-meta">
          <span>${date}</span>
          <span>${readTime} min read</span>
          <span>By ${author}</span>
        </div>
      </header>

      <div class="audio-summary" id="audioSummaryBar">
        <span class="audio-summary-icon">🎧</span>
        <div style="flex:1;min-width:0">
          <div class="audio-summary-label">AI Audio Summary</div>
          <div class="audio-summary-text" id="audioSummaryText">${p.excerpt ? DOMPurify.sanitize(p.excerpt.substring(0,80), {ALLOWED_TAGS:[]}) + '…' : 'Listen to article summary'}</div>
        </div>
        <div class="audio-wave" id="audioWave"><span></span><span></span><span></span></div>
        <button class="audio-btn" id="audioBtnPlay"  title="Play"  onclick="audioPlay()">▶</button>
        <button class="audio-btn" id="audioBtnPause" title="Pause" onclick="audioPause()" style="display:none">⏸</button>
        <button class="audio-btn" id="audioBtnStop"  title="Stop"  onclick="audioStop()" style="display:none">⏹</button>
      </div>

      <div class="ad-unit ad-leaderboard">
        <span class="ad-label">Advertisement</span>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5696584446633401" data-ad-slot="6614122455" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
      
      <div class="article-content">${content}</div>
      
      <section class="author-sec">
        <div class="author-avatar">${author[0].toUpperCase()}</div>
        <div class="author-info">
          <h4>${author}</h4>
          <p>Institutional Analyst covering ${category}</p>
        </div>
      </section>

        </div>
      </section>
    `;
  }

  function renderError(code) {
    document.getElementById('articleBody').innerHTML = `
      <div class="error-state">
        <h2>${code}</h2>
        <a href="index.html" class="back-link" style="color:var(--gold)">← Return to Central Intelligence</a>
      </div>
    `;
  }

  init();
</script>
<script>
// ── AI Audio Summary Engine ───────────────────────────────────────────────
(function() {
  let _utterance = null;
  let _audioText  = '';

  function _getAudioText() {
    const excerptEl = document.getElementById('audioSummaryText');
    if (excerptEl) {
      const t = excerptEl.textContent.replace(/…$/, '').trim();
      if (t && t !== 'Listen to article summary') return t;
    }
    const firstPara = document.querySelector('.article-content p');
    if (firstPara) return firstPara.textContent.trim().substring(0, 400);
    return '';
  }

  function _setPlaying(isPlaying) {
    const wave   = document.getElementById('audioWave');
    const btnPlay  = document.getElementById('audioBtnPlay');
    const btnPause = document.getElementById('audioBtnPause');
    const btnStop  = document.getElementById('audioBtnStop');
    if (!wave) return;
    if (isPlaying) {
      wave.classList.add('playing');
      if (btnPlay)  btnPlay.style.display  = 'none';
      if (btnPause) btnPause.style.display = '';
      if (btnStop)  btnStop.style.display  = '';
    } else {
      wave.classList.remove('playing');
      if (btnPlay)  btnPlay.style.display  = '';
      if (btnPause) btnPause.style.display = 'none';
      if (btnStop)  btnStop.style.display  = 'none';
    }
  }

  window.audioPlay = function() {
    const synth = window.speechSynthesis;
    if (!synth) return;
    if (synth.paused) { synth.resume(); _setPlaying(true); return; }
    synth.cancel();
    _audioText = _getAudioText();
    if (!_audioText) return;
    _utterance = new SpeechSynthesisUtterance(_audioText);
    _utterance.rate = 0.9; _utterance.pitch = 1; _utterance.lang = 'en-US';
    _utterance.onstart = () => _setPlaying(true);
    _utterance.onend   = () => _setPlaying(false);
    _utterance.onerror = () => _setPlaying(false);
    synth.speak(_utterance);
  };

  window.audioPause = function() {
    const synth = window.speechSynthesis;
    if (!synth) return;
    if (synth.speaking && !synth.paused) {
      synth.pause();
      const wave   = document.getElementById('audioWave');
      const btnPlay  = document.getElementById('audioBtnPlay');
      const btnPause = document.getElementById('audioBtnPause');
      if (wave) wave.classList.remove('playing');
      if (btnPlay) btnPlay.style.display = '';
      if (btnPause) btnPause.style.display = 'none';
    }
  };

  window.audioStop = function() {
    const synth = window.speechSynthesis;
    if (!synth) return;
    synth.cancel();
    _setPlaying(false);
  };
})();
</script>
