name: Manual Terminal Dispatch

on:
  schedule:
    - cron: '0 5 * * *'        # Daily Research (5 AM UTC)
    - cron: '0 6 * * 1'        # Weekly Heavy Research (Monday 6 AM UTC)
    - cron: '30 7 1 * *'       # Monthly Institutional Tome (1st of month 7:30 AM UTC)
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Analysis Frequency to Trigger'
        required: true
        default: 'daily'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      mode:
        description: 'Operation Mode (worker, archive)'
        required: true
        default: 'worker'
        type: choice
        options:
          - worker
          - archive
      type:
        description: 'Asset Type (article, research)'
        required: true
        default: 'article'
        type: choice
        options:
          - article
          - research
      force:
        description: 'Force Regeneration (ignores existing files)'
        required: false
        default: false
        type: boolean
      model:
        description: 'Target AI Model (Groq, SambaNova, Cerebras)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - groq
          - sambanova
          - cerebras

concurrency:
  group: sovereign-swarm-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # PHASE 0: DYNAMIC MATRIX SETUP
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      verticals: ${{ steps.set-matrix.outputs.verticals }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Discover Swarm Registry
        id: set-matrix
        run: |
          # [V12.3] Standard GHA Config Export (via $GITHUB_OUTPUT)
          node scripts/export-swarm-config.mjs --freq="${{ github.event.inputs.frequency || 'monthly' }}"

  # PHASE 1: PARALLEL RESEARCH WORKERS (Multi-Runner Scaling)
  research-workers:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    strategy:
      fail-fast: false
      max-parallel: 20 # [V12.3] High-Density Concurrency
      matrix:
        # [V12.3] Matrix now active for ALL frequencies (including Daily)
        vertical: ${{ fromJSON(needs.setup-matrix.outputs.verticals) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Execute Vertical Research Fragment

        env:
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          # [V12.3] Hybrid "Best of Both Worlds" Tunnel
          OLLAMA_PROD_URL: ${{ secrets.NGROK_REMOTE_URL }}
          OLLAMA_PROD_KEY: ${{ secrets.OLLAMA_PROD_KEY }}
          # [V16.1] Institutional Multi-Agent Sync
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          QWEB_API_KEY: ${{ secrets.QWEB_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SWARM_JOB_ID: "swarm-${{ github.event.inputs.frequency || 'monthly' }}-${{ github.run_id }}"
          INPUT_FREQ: ${{ github.event.inputs.frequency || 'monthly' }}
        run: |
          # [V16.2] Sovereign Event Hardening: Deterministic Frequency & Mode Mapping
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            case "${{ github.event.schedule }}" in
              "0 5 * * *") FREQ="daily" ;;
              "0 6 * * 1") FREQ="weekly" ;;
              "30 7 1 * *") FREQ="monthly" ;;
              *) FREQ="daily" ;;
            esac
          else
            FREQ="${{ github.event.inputs.frequency || 'daily' }}"
          fi
          
          MODEL="${{ github.event.inputs.model || 'auto' }}"
          MODE="worker"  # Force worker mode for parallel research phase
          TYPE="${{ github.event.inputs.type || 'article' }}"
          
          echo "🚀 Starting Parallel Research [$FREQ] [$MODE] [Vertical: ${{ matrix.vertical }}]"
          node scripts/generate-institutional-tome.js --freq=$FREQ --type=$TYPE --mode=$MODE --vertical=${{ matrix.vertical }} --model=$MODEL
      
      - name: Upload Sector Fragment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sector-${{ matrix.vertical }}
          path: manuscripts/v7/sectors/*_${{ matrix.vertical }}.json
          retention-days: 1

  # PHASE 2: CONSOLIDATION & DISPATCH (Sovereign Synthesis)
  consolidate-and-dispatch:
    runs-on: ubuntu-latest
    needs: [research-workers]
    if: always()
    timeout-minutes: 60 # [V12.3] Expansive window for Sovereign Self-Healing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      
      - name: Download all Sector Fragments
        uses: actions/download-artifact@v4
        with:
          path: manuscripts/v7/sectors/
          pattern: sector-*
          merge-multiple: true

      - name: Gather Fragments and Assemble Tome
        env:
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          QWEB_API_KEY: ${{ secrets.QWEB_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Failover Tunnel for Consolidator (Audit pass)
          OLLAMA_PROD_URL: ${{ secrets.NGROK_REMOTE_URL }}
          OLLAMA_PROD_KEY: ${{ secrets.OLLAMA_PROD_KEY }}
          # [V16.1] Consolidated Archival Telemetry
          SWARM_JOB_ID: "swarm-${{ github.event.inputs.frequency || 'daily' }}-${{ github.run_id }}"
        run: |
          # [V16.2] Sovereign Event Hardening: Final Synthesis
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            case "${{ github.event.schedule }}" in
              "0 5 * * *") FREQ="daily" ;;
              "0 6 * * 1") FREQ="weekly" ;;
              "30 7 1 * *") FREQ="monthly" ;;
              *) FREQ="daily" ;;
            esac
          else
            FREQ="${{ github.event.inputs.frequency || 'daily' }}"

          fi

          MODEL="${{ github.event.inputs.model || 'auto' }}"
          MODE="assemble" # Force assemble mode for consolidation phase
          TYPE="${{ github.event.inputs.type || 'article' }}"
          
          export INPUT_FREQ=$FREQ
          echo "🏰 Commencing Institutional Assembly [$FREQ] [$MODE]"

          if [ "$FREQ" == "hourly" ]; then
             npm run ecc:governance
             node scripts/generate-institutional-tome.js --freq="$FREQ" --force
          else
             # [V16.2] Sequential Assembly Pass
             node scripts/generate-institutional-tome.js --freq=$FREQ --type=$TYPE --mode=$MODE --model=$MODEL
             
             # [V16.1] Institutional PDF Rendering Pass
             echo "📑 Initiating PDF Reproduction..."
             node scripts/generate-pdf.js
          fi

      - name: Commit and Push Results
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add public/briefings/ public/articles/ public/posts/ public/index.json sitemap.xml dist/ manuscripts/ *.pdf 2>/dev/null || echo "No changes"
          git commit -m "chore: autonomous hybrid dispatch [registry: Institutional-AI]" || echo "No changes"
          
          # [V16.1] Resilient Git Archival with Randomized Jitter Retry
          for i in {1..5}; do
            git pull --rebase origin main && git push && exit 0 || {
              echo "⚠️ [Archival] Push collision (Attempt $i). Jittering..."
              sleep $[ ( $RANDOM % 10 ) + 1 ]s
            }
          done
          echo "❌ [Archival] Sovereign push failed after 5 attempts. Manual resolution required." && exit 1

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: blogspro-ai
          channelId: live
