name: Manual Terminal Dispatch

on:
  schedule:
    # Run every Friday at 12:00 PM UTC (5:30 PM IST)
    - cron: '0 12 * * 5'
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Analysis Frequency to Trigger'
        required: true
        default: 'daily'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      force:
        description: 'Force Regeneration (ignores existing files)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Execute Autonomous Briefing/Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QWEB_KEY: ${{ secrets.QWEB_KEY }}
          NEWS_API_KEY: ${{ secrets.API_KEY_NEWS }}
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          FREQ="${{ github.event.inputs.frequency }}"
          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          
          if [ "$FREQ" == "hourly" ] || [ "$FREQ" == "daily" ]; then
            node scripts/generate-institutional-tome.js --freq=$FREQ $FORCE_FLAG
          else
            node scripts/generate-post.js --freq=$FREQ $FORCE_FLAG
          fi
      - name: Commit and Push
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add briefings/ articles/ index.html sitemap.xml knowledge/ dist/ manuscripts/ *.pdf *.pdf.txt || echo "No change in some artifacts"
          git commit -m "chore: autonomous research dispatch [skip ci]" || echo "No changes"
          for i in {1..5}; do
            git pull --rebase origin main
            git push && exit 0
            sleep 15
          done
      - name: Notify Socials
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js --freq=${{ github.event.inputs.frequency }}
