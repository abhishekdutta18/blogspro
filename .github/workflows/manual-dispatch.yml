name: Manual Terminal Dispatch

on:
  schedule:
    - cron: '0 5 * * *'        # Daily Research (5 AM UTC)
    - cron: '0 6 * * 1'        # Weekly Heavy Research (Monday 6 AM UTC)
    - cron: '30 7 1 * *'       # Monthly Institutional Tome (1st of month 7:30 AM UTC)
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Analysis Frequency to Trigger'
        required: true
        default: 'daily'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      force:
        description: 'Force Regeneration (ignores existing files)'
        required: false
        default: false
        type: boolean

concurrency:
  group: manual-dispatch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mirofish/backend/requirements.txt
          
      - name: Fetch Secrets from Cloudflare Strategic Vault
        id: vault
        continue-on-error: true
        env:
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
        run: |
          # V5.3 Hardened Vault Endpoint (Institutional)
          VAULT_URL="https://blogspro-pulse.abhishek-dutta1996.workers.dev/vault"
          echo "📡 Connecting to BlogsPro Strategic Vault at $VAULT_URL..."
          
          # Use a shorter timeout to avoid hanging if the vault is misconfigured
          RESPONSE=$(curl -s --connect-timeout 10 -X POST "$VAULT_URL" \
            -H "X-Vault-Auth: $VAULT_MASTER_KEY" \
            -H "Content-Type: application/json")

          if [ $? -ne 0 ]; then
             echo "⚠️ Vault Error: Connection timeout or network failure."
             echo "💡 Fallback: Using legacy/repository secrets if available."
             exit 0
          fi

          if echo "$RESPONSE" | grep -q "authenticated"; then
            echo "✅ Vault Authenticated. Injecting 2026 Cluster Credentials..."
            
            # Extract and Mask Secrets
            GH_PAT=$(echo "$RESPONSE" | jq -r '.secrets.GH_PAT // empty')
            GEMINI=$(echo "$RESPONSE" | jq -r '.secrets.GEMINI // empty')
            GROQ=$(echo "$RESPONSE" | jq -r '.secrets.GROQ // empty')
            MISTRAL=$(echo "$RESPONSE" | jq -r '.secrets.MISTRAL // empty')
            SENTRY_DSN=$(echo "$RESPONSE" | jq -r '.secrets.SENTRY_DSN // empty')
            
            if [ -n "$GH_PAT" ] && [ "$GH_PAT" != "null" ]; then
                echo "::add-mask::$GH_PAT"
                echo "GH_PAT=$GH_PAT" >> $GITHUB_ENV
                echo "GH_TOKEN=$GH_PAT" >> $GITHUB_ENV
            else
                echo "⚠️ Vault Warning: GH_PAT is missing in vault response. Using repo secret fallback."
            fi

            [ -n "$GEMINI" ] && [ "$GEMINI" != "null" ] && echo "::add-mask::$GEMINI" && echo "GEMINI_API_KEY=$GEMINI" >> $GITHUB_ENV
            [ -n "$GROQ" ] && [ "$GROQ" != "null" ] && echo "::add-mask::$GROQ" && echo "GROQ_API_KEY=$GROQ" >> $GITHUB_ENV
            [ -n "$MISTRAL" ] && [ "$MISTRAL" != "null" ] && echo "::add-mask::$MISTRAL" && echo "MISTRAL_API_KEY=$MISTRAL" >> $GITHUB_ENV
            [ -n "$SENTRY_DSN" ] && [ "$SENTRY_DSN" != "null" ] && echo "::add-mask::$SENTRY_DSN" && echo "SENTRY_DSN=$SENTRY_DSN" >> $GITHUB_ENV
          else
             echo "⚠️ Vault Warning: $(echo "$RESPONSE" | jq -r '.error // "Unknown connection failure"')"
             echo "💡 System will attempt to run using Repository Secrets."
          fi

      - name: Execute Autonomous Briefing/Article
        timeout-minutes: 25
        env:
          # V5.0: Secrets now pulled dynamically from CF Vault
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ env.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ env.MISTRAL_API_KEY }}
          GH_TOKEN: ${{ env.GH_PAT }}

          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN }}

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.WEBHOOK_SECRET }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          # ── V5.0: Dynamic Frequency Switch (Autonomous Trigger) ──────
          if [ "${{ github.event_name }}" == "schedule" ]; then
            CRON_TRIGGER="${{ github.event.schedule }}"
            echo "⏰ Scheduled trigger detected: $CRON_TRIGGER"
            if [ "$CRON_TRIGGER" == "0 5 * * *" ]; then FREQ="daily";
            elif [ "$CRON_TRIGGER" == "0 6 * * 1" ]; then FREQ="weekly";
            elif [ "$CRON_TRIGGER" == "30 7 1 * *" ]; then FREQ="monthly";
            else FREQ="daily"; fi
          else
            FREQ="${{ github.event.inputs.frequency }}"
          fi

          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          echo "🚀 Executing Swarm Vertical: $FREQ"
          
          if [ "$FREQ" == "hourly" ] || [ "$FREQ" == "daily" ]; then
            node scripts/generate-briefing.js --freq=$FREQ $FORCE_FLAG
          else
            node scripts/generate-institutional-tome.js --freq=$FREQ --type=article $FORCE_FLAG
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add briefings/ articles/ index.html sitemap.xml knowledge/ dist/ manuscripts/ *.pdf *.pdf.txt || echo "No change in some artifacts"
          git commit -m "chore: autonomous research dispatch [skip ci]" || echo "No changes"
          for i in {1..5}; do
            git pull --rebase origin main
            git push && exit 0
            sleep 15
          done
      - name: Notify Socials
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js --freq=${{ github.event.inputs.frequency }}
