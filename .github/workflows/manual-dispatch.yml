name: Manual Terminal Dispatch

on:
  schedule:
    - cron: '0 5 * * *'        # Daily Research (5 AM UTC)
    - cron: '0 6 * * 1'        # Weekly Heavy Research (Monday 6 AM UTC)
    - cron: '30 7 1 * *'       # Monthly Institutional Tome (1st of month 7:30 AM UTC)
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Analysis Frequency to Trigger'
        required: true
        default: 'daily'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      force:
        description: 'Force Regeneration (ignores existing files)'
        required: false
        default: false
        type: boolean
      model:
        description: 'Target AI Model (Groq, SambaNova, Cerebras)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - groq
          - sambanova
          - cerebras

concurrency:
  group: sovereign-swarm-lock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # PHASE 0: DYNAMIC MATRIX SETUP
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      verticals: ${{ steps.set-matrix.outputs.verticals }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Discover Swarm Registry
        id: set-matrix
        run: |
          # [V12.3] Standard GHA Config Export (via $GITHUB_OUTPUT)
          node scripts/export-swarm-config.mjs --freq=${{ github.event.inputs.frequency || 'monthly' }}

  # PHASE 1: PARALLEL RESEARCH WORKERS (Multi-Runner Scaling)
  research-workers:
    runs-on: ubuntu-latest
    needs: [setup-matrix]
    strategy:
      fail-fast: false
      max-parallel: 20 # [V12.3] High-Density Concurrency
      matrix:
        # [V12.3] Matrix now active for ALL frequencies (including Daily)
        vertical: ${{ fromJSON(needs.setup-matrix.outputs.verticals) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      - name: Execute Vertical Research Fragment
        env:
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          # [V12.3] Hybrid "Best of Both Worlds" Tunnel
          OLLAMA_PROD_URL: ${{ secrets.NGROK_REMOTE_URL }}
          OLLAMA_PROD_KEY: ${{ secrets.OLLAMA_PROD_KEY }}
          SWARM_JOB_ID: "swarm-${{ github.event.inputs.frequency || 'monthly' }}-${{ github.run_id }}"
        run: |
          FREQ="${{ github.event.inputs.frequency || 'monthly' }}"
          MODEL="${{ github.event.inputs.model || 'auto' }}"
          node scripts/generate-institutional-tome.js --freq=$FREQ --type=article --mode=worker --vertical=${{ matrix.vertical }} --model=$MODEL
      
      - name: Upload Sector Fragment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sector-${{ matrix.vertical }}
          path: manuscripts/v7/sectors/swarm-${{ github.event.inputs.frequency || 'monthly' }}-${{ github.run_id }}_${{ matrix.vertical }}.json
          retention-days: 1

  # PHASE 2: CONSOLIDATION & DISPATCH (Sovereign Synthesis)
  consolidate-and-dispatch:
    runs-on: ubuntu-latest
    needs: [research-workers]
    if: always()
    timeout-minutes: 60 # [V12.3] Expansive window for Sovereign Self-Healing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --fund=false
      
      - name: Download all Sector Fragments
        uses: actions/download-artifact@v4
        with:
          path: manuscripts/v7/sectors/
          pattern: sector-*
          merge-multiple: true

      - name: Gather Fragments and Assemble Tome
        env:
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Failover Tunnel for Consolidator (Audit pass)
          OLLAMA_PROD_URL: ${{ secrets.NGROK_REMOTE_URL }}
          OLLAMA_PROD_KEY: ${{ secrets.OLLAMA_PROD_KEY }}
          SWARM_JOB_ID: "swarm-${{ github.event.inputs.frequency || 'monthly' }}-${{ github.run_id }}"
        run: |
          FREQ="${{ github.event.inputs.frequency || 'monthly' }}"
          MODEL="${{ github.event.inputs.model || 'auto' }}"
          
          if [ "$FREQ" == "hourly" ]; then
             # Fast Pulse: Single runner
             node scripts/generate-briefing.js --freq=$FREQ
          else
             # Daily, Weekly, Monthly: Parallel Reengineering
             node scripts/generate-institutional-tome.js --freq=$FREQ --type=article --mode=assemble --model=$MODEL
          fi

      - name: Commit and Push Results
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add briefings/ articles/ index.html sitemap.xml dist/ manuscripts/ *.pdf || echo "No changes"
          git commit -m "chore: autonomous hybrid dispatch [matrix=20] [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push || echo "Push failed, retrying in next cycle"
