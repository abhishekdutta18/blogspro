name: Deploy KV Cache Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/kv-cache.js"
      - "wrangler.toml"
  workflow_dispatch: {}

jobs:
  deploy:
    if: github.repository_owner == 'abhishekdutta18'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy kv-cache worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env kv-cache
