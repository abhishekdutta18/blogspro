name: "Deploy Swarm 4.0 hierarchy"

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - "wrangler.toml"
      - "wrangler.miro-sync.toml"
  workflow_dispatch:

jobs:
  deploy-mirosync:
    name: "Wave 0: MiroSync"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: "npm install"
      - name: "Deploy MiroSync"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          wranglerConfigPath: "wrangler.miro-sync.toml"
          wranglerVersion: "3.114.17"

  deploy-base:
    name: "Wave 1: Base Tiers"
    needs: "deploy-mirosync"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        environment: ["data-hub", "relevance", "auditor", "seo", "templates"]
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: "npm install"
      - name: "Deploy Tier [${{ matrix.environment }}]"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          environment: "${{ matrix.environment }}"
          wranglerConfigPath: "wrangler.toml"
          wranglerVersion: "3.114.17"

  deploy-orchestrator:
    name: "Wave 2: Pulse Orchestrator"
    needs: "deploy-base"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: "npm install"
      - name: "Deploy Pulse Tier"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          environment: "pulse"
          wranglerConfigPath: "wrangler.toml"
          wranglerVersion: "3.114.17"

  deploy-discovery:
    name: "Wave 3: MiroFish Discovery"
    needs: "deploy-mirosync"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: "npm install"
      - name: "Deploy MiroFish Tier"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          environment: "mirofish"
          wranglerConfigPath: "wrangler.toml"
          wranglerVersion: "3.114.17"

  push-swarm-secrets:
    name: "Push Governance Secrets"
    needs: ["deploy-orchestrator", "deploy-discovery"]
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: "npm install"
      - name: "Push Secrets to All Tiers"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
          GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
          OPENROUTER_KEY: "${{ secrets.OPENROUTER_KEY }}"
          SWARM_INTERNAL_TOKEN: "${{ secrets.SWARM_INTERNAL_TOKEN }}"
          GH_PAT: "${{ secrets.GH_PAT }}"
        run: |
          for env in data-hub relevance auditor seo pulse miro-sync mirofish; do
            echo "Pushing secrets to $env..."
            CONF="wrangler.toml"
            OPTS="--env $env"
            if [ "$env" = "miro-sync" ]; then
              CONF="wrangler.miro-sync.toml"
              OPTS=""
            fi
            echo "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY $OPTS --config $CONF || true
            echo "$GROQ_API_KEY" | npx wrangler secret put GROQ_API_KEY $OPTS --config $CONF || true
            echo "$OPENROUTER_KEY" | npx wrangler secret put OPENROUTER_KEY $OPTS --config $CONF || true
            echo "$GH_PAT" | npx wrangler secret put GH_TOKEN $OPTS --config $CONF || true
            echo "$SWARM_INTERNAL_TOKEN" | npx wrangler secret put SWARM_INTERNAL_TOKEN $OPTS --config $CONF || true
          done
          echo "Swarm 4.0 secrets synchronized."

  trigger-swarm:
    name: "Autonomous Swarm Initialization"
    needs: ["push-swarm-secrets"]
    runs-on: "ubuntu-latest"
    steps:
      - name: "Trigger All Frequencies"
        env:
          SWARM_TOKEN: "${{ secrets.SWARM_INTERNAL_TOKEN }}"
          BASE_URL: "https://blogspro-pulse.abhishekdutta18.workers.dev"
        run: |
          echo "Initializing Swarm 4.0 Frequencies..."
          curl -sf -H "X-Swarm-Token: $SWARM_TOKEN" "$BASE_URL/?freq=hourly" || echo "hourly trigger attempted"
          curl -sf -H "X-Swarm-Token: $SWARM_TOKEN" "$BASE_URL/?freq=daily" || echo "daily trigger attempted"
          curl -sf -H "X-Swarm-Token: $SWARM_TOKEN" "$BASE_URL/?freq=weekly&type=article" || echo "weekly trigger attempted"
          curl -sf -H "X-Swarm-Token: $SWARM_TOKEN" "$BASE_URL/?freq=monthly&type=article" || echo "monthly trigger attempted"
          echo "Swarm Initialization Complete."
