name: BlogsPro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check JS syntax
        run: |
          for f in js/*.js js/ai/*.js; do
            node --check "$f" || exit 1
          done

      - name: Warn on console.log
        run: |
          grep -rn 'console.log' js/ && echo 'Warning: console.log found' || true

      - name: Check HTML files exist
        run: |
          for f in index.html post.html login.html register.html; do
            test -f "$f" && echo "✓ $f" || echo "✕ $f missing"
          done

  auto-merge:
    runs-on: ubuntu-latest
    needs: validate
    # Only run on PRs — skip on direct pushes to main
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Enable auto-merge
        # Queues the PR to merge automatically once all checks pass.
        # GITHUB_TOKEN can merge but cannot self-approve — approval step removed.
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
