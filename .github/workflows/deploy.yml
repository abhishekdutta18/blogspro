name: BlogsPro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # JOB 1: validate — static checks, runs on every push and every PR
  # ══════════════════════════════════════════════════════════════════════
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          find js/ -name "*.js" | while read f; do
            node --check "$f" || exit 1
          done
          echo "✓ All JS files pass syntax check"

      - name: Warn on console.log
        run: |
          if grep -rn 'console\.log' js/; then
            echo "⚠ Warning: console.log found (not blocking)"
          else
            echo "✓ No console.log found"
          fi

      - name: Check critical HTML files exist
        run: |
          failed=0
          for f in index.html post.html login.html register.html admin.html; do
            if test -f "$f"; then
              echo "✓ $f"
            else
              echo "✕ $f MISSING"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Check robots.txt
        run: |
          test -f "robots.txt" && echo "✓ robots.txt" || (echo "✕ robots.txt missing" && exit 1)
          test ! -f "Robots.txt" && echo "✓ no capital-R Robots.txt" || (echo "✕ Robots.txt capital R — rename it" && exit 1)

      - name: Check CSS brace balance
        run: |
          python3 - <<'EOF'
          import sys
          with open('css/admin.css') as f:
              css = f.read()
          opens  = css.count('{')
          closes = css.count('}')
          if opens != closes:
              print(f"✕ css/admin.css brace mismatch: {opens} open vs {closes} close")
              sys.exit(1)
          print(f"✓ css/admin.css braces balanced ({opens} pairs)")
          EOF

      - name: Check sitemap.xml
        run: |
          test -f sitemap.xml && echo "✓ sitemap.xml" || echo "⚠ sitemap.xml missing (not blocking)"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2: notify — runs after validate passes on every push to main
  # Sends GitHub summary + Telegram message when site goes live
  # ══════════════════════════════════════════════════════════════════════
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Write deployment summary
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          DEPLOY_TIME=$(date -u "+%Y-%m-%d %H:%M UTC")
          SHORT_SHA="${COMMIT_SHA:0:7}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ BlogsPro is Live

          | | |
          |---|---|
          | **URL** | [https://blogspro.in](https://blogspro.in) |
          | **Commit** | [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$COMMIT_SHA) |
          | **Message** | $COMMIT_MSG |
          | **Author** | $COMMIT_AUTHOR |
          | **Deployed at** | $DEPLOY_TIME |
          | **Status** | All checks passed ✓ |

          [View live site →](https://blogspro.in) · [View commit →](https://github.com/${{ github.repository }}/commit/$COMMIT_SHA)
          EOF

      - name: Telegram deployment notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          DEPLOY_TIME=$(date -u "+%d %b %Y %H:%M UTC")
          MSG="✅ BlogsPro is Live%0A%0A"
          MSG+="📦 Commit: ${SHORT_SHA}%0A"
          MSG+="📝 ${COMMIT_MSG}%0A"
          MSG+="🕐 ${DEPLOY_TIME}%0A%0A"
          MSG+="🌐 https://blogspro.in"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true"
          echo "✓ Telegram notification sent"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 3: auto-merge — merge PRs after validate passes
  # ══════════════════════════════════════════════════════════════════════
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════
  # JOB 4: notify-failure — runs ONLY if validate fails
  # ══════════════════════════════════════════════════════════════════════
  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: validate
    if: failure() && github.event_name == 'push'
    steps:
      - name: Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ *BlogsPro CI Failed*%0A%0A"
          MSG+="📦 Commit: [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})%0A"
          MSG+="Author: ${{ github.event.head_commit.author.name }}%0A"
          MSG+="🔴 The Static Validation job failed.%0A"
          MSG+="[View execution details →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
          echo "✓ Telegram failure notification sent"
