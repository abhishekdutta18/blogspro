name: BlogsPro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 now — avoids the deprecation warning for actions/checkout.
# Node 24 becomes the forced default on June 2nd, 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# Job 1 — Validate (runs on every push & PR)
# ─────────────────────────────────────────────
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Check JS syntax
        run: |
          echo "Checking JS syntax..."
          failed=0
          for f in js/*.js js/ai/*.js js/services/*.js; do
            if node --check "$f" 2>&1; then
              echo "  ✓ $f"
            else
              echo "  ✕ $f"
              failed=1
            fi
          done
          exit $failed

      - name: Warn on console.log
        run: |
          echo "Scanning for console.log..."
          grep -rn 'console.log' js/ && echo "⚠ console.log statements found above" || echo "✓ No console.log found"

      - name: Check required HTML files
        run: |
          echo "Checking required HTML files..."
          failed=0
          for f in index.html post.html login.html register.html; do
            if test -f "$f"; then
              echo "  ✓ $f"
            else
              echo "  ✕ $f — MISSING"
              failed=1
            fi
          done
          exit $failed

      - name: Check robots.txt exists (lowercase)
        run: |
          echo "Checking robots.txt..."
          if test -f robots.txt; then
            echo "  ✓ robots.txt"
          else
            echo "  ✕ robots.txt missing (lowercase r required — Googlebot won't find Robots.txt)"
            exit 1
          fi
          if test -f Robots.txt; then
            echo "  ✕ Robots.txt (capital R) still exists — rename it to robots.txt"
            exit 1
          fi
          echo "  ✓ no capital-R Robots.txt"

      - name: Check CSS brace balance
        run: |
          echo "Checking CSS brace balance..."
          opens=$(grep -o '{' css/admin.css | wc -l)
          closes=$(grep -o '}' css/admin.css | wc -l)
          if [ "$opens" -eq "$closes" ]; then
            echo "  ✓ CSS braces balanced ($opens open, $closes close)"
          else
            echo "  ✕ Brace mismatch: $opens open vs $closes close"
            exit 1
          fi

      - name: Check post-audit imported in main.js
        run: |
          echo "Checking post-audit import..."
          if grep -q "post-audit" js/main.js; then
            echo "  ✓ post-audit.js imported in main.js"
          else
            echo "  ✕ post-audit.js not imported in main.js"
            exit 1
          fi

# ─────────────────────────────────────────────
# Job 2 — Auto-merge (PRs only, after validate)
# ─────────────────────────────────────────────
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Merge PR
        # Uses --merge (immediate) instead of --auto (requires branch protection rules).
        # GITHUB_TOKEN cannot self-approve, so --squash avoids any approval gate.
        # To update this workflow file itself, push directly to main — a workflow-only
        # PR cannot merge itself as the new definition isn't trusted until it's on main.
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
