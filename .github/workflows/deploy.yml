name: BlogsPro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          for f in js/*.js js/ai/*.js; do
            node --check "$f" || exit 1
          done

      - name: Warn on console.log
        run: |
          grep -rn 'console.log' js/ && echo 'Warning: console.log found' || true

      - name: Check HTML files exist
        run: |
          for f in index.html post.html login.html register.html; do
            test -f "$f" && echo "✓ $f" || echo "✕ $f missing"
          done

  auto-merge:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Auto-approve and merge PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
