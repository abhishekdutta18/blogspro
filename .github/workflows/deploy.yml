name: BlogsPro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # JOB 1: validate — static checks, runs on every push and every PR
  # ══════════════════════════════════════════════════════════════════════
  validate:
    name: Code Quality & Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Syntax Check
        run: |
          find scripts api js -name "*.js" | while IFS= read -r f; do
            node --check "$f" || (echo "❌ Syntax error in $f" && exit 1)
          done
      - name: Verify Required Secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEWSLETTER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
        run: |
          MISSING=()
          [ -z "$CF_TOKEN" ] && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "$GEMINI_KEY" ] && MISSING+=("GEMINI_API_KEY")
          [ -z "$SENTRY_TOKEN" ] && MISSING+=("SENTRY_AUTH_TOKEN")
          [ -z "$NEWSLETTER_URL" ] && MISSING+=("NEWSLETTER_WORKER_URL")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "⚠️ Missing secrets (non-blocking): ${MISSING[*]}"
            echo "Some features may be unavailable. Add missing secrets in Repo Settings → Secrets → Actions."
          else
            echo "✅ All required secrets present"
          fi

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2: notify — runs after validate passes on every push to main
  # Sends GitHub summary + Telegram message when site goes live
  # ══════════════════════════════════════════════════════════════════════
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Write deployment summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DEPLOY_TIME=$(date -u "+%Y-%m-%d %H:%M UTC")
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ✅ BlogsPro is Live

          | | |
          |---|---|
          | **URL** | [https://blogspro.in](https://blogspro.in) |
          | **Commit** | [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${COMMIT_SHA}) |
          | **Message** | ${COMMIT_MSG} |
          | **Author** | ${COMMIT_AUTHOR} |
          | **Deployed at** | ${DEPLOY_TIME} |
          | **Status** | All checks passed ✓ |

          [View live site →](https://blogspro.in) · [View commit →](https://github.com/${REPO}/commit/${COMMIT_SHA})
          EOF

      - name: Telegram deployment notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use local env vars to avoid YAML interpolation issues in shell
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DEPLOY_TIME=$(date -u "+%d %b %Y %H:%M UTC")

          # Fetch PR info via GH CLI
          PR_JSON=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/pulls" 2>/dev/null || echo "[]")
          PR_NUM=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.[0].title // empty')

          if [ -n "$PR_NUM" ]; then
            MSG="🔀 PR #${PR_NUM} Merged & Deployed%0A%0A📋 ${PR_TITLE}%0A📦 ${SHORT_SHA} · ${DEPLOY_TIME}%0A🌐 https://blogspro.in/?utm_source=telegram&utm_medium=ci&utm_campaign=deploy"
          else
            MSG="✅ BlogsPro Deployed%0A%0A📦 ${SHORT_SHA} · ${DEPLOY_TIME}%0A🌐 https://blogspro.in/?utm_source=telegram&utm_medium=ci&utm_campaign=deploy"
          fi

          # Only send if secrets are present
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "parse_mode=HTML" \
              -d "disable_web_page_preview=true" \
              -d "text=${MSG}"
          fi
          echo "✓ Telegram notification sent"

  # ══════════════════════════════════════════════════════════════════════
  # JOB 3: auto-merge — merge PRs after validate passes
  # ══════════════════════════════════════════════════════════════════════
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --auto && exit 0
          echo "Attempt 1 failed, retrying in 2s..."
          sleep 2
          gh pr merge "$PR_NUMBER" --squash --auto && exit 0
          echo "Attempt 2 failed, retrying in 4s..."
          sleep 4
          gh pr merge "$PR_NUMBER" --squash --auto && exit 0
          echo "Attempt 3 failed, retrying in 8s..."
          sleep 8
          gh pr merge "$PR_NUMBER" --squash --auto && exit 0
          echo "WARNING: Auto-merge failed after 4 attempts - merge manually on GitHub"
          exit 0

  # ══════════════════════════════════════════════════════════════════════
  # JOB 5: seo-build — generates static posts and sitemap
  # ══════════════════════════════════════════════════════════════════════
  seo-build:
    name: SEO Engine
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Static Posts & Sitemap
        env:
          FIREBASE_PROJECT_ID: "blogspro-ai"
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node scripts/build-static.js
          node scripts/generate-sitemap.js
      - name: Commit & Push Changes
        run: |
          git config --global user.name "BlogsPro Engine"
          git config --global user.email "engine@blogspro.in"
          
          # Add all generated assets (including those in directories)
          git add .
          git commit -m "🤖 auto-seo: update static posts and sitemap [skip ci]" || echo "No changes to commit"
          
          # Retry loop for push (up to 5 attempts with robust rebase)
          for i in {1..5}; do
            git pull --rebase --autostash origin main
            git push && exit 0
            echo "⚠️ Push rejected (Attempt $i), retrying in 10s..."
            sleep 10
          done
          echo "❌ Git Push failed after 5 attempts." && exit 1

  # ══════════════════════════════════════════════════════════════════════
  # JOB 5b: cloudflare-purge — purge CDN cache after deploy
  # ══════════════════════════════════════════════════════════════════════
  cloudflare-purge:
    name: Purge Cloudflare Cache
    runs-on: ubuntu-latest
    needs: notify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Purge Cloudflare cache for blogspro.in
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "⚠️ CLOUDFLARE_API_TOKEN not set — skipping cache purge"
            exit 0
          fi

          # Get zone ID if not provided as secret
          if [ -z "$CF_ZONE" ]; then
            CF_ZONE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=blogspro.in" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" | jq -r '.result[0].id // empty')
          fi

          if [ -z "$CF_ZONE" ]; then
            echo "⚠️ Could not determine Cloudflare Zone ID — skipping cache purge"
            exit 0
          fi

          echo "Purging Cloudflare cache for zone $CF_ZONE..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          SUCCESS=$(echo "$RESULT" | jq -r '.success // false')
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Cloudflare cache purged successfully"
          else
            echo "❌ Purge failed: $(echo "$RESULT" | jq -r '.errors // .messages')"
            exit 0  # non-fatal
          fi

  # ══════════════════════════════════════════════════════════════════════
  # JOB 6: notify-failure — runs ONLY if validate fails
  # ══════════════════════════════════════════════════════════════════════
  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: validate
    if: failure() && github.event_name == 'push'
    steps:
      - name: Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          MSG="❌ BlogsPro CI Failed%0A%0A"
          MSG+="📦 Commit: ${SHORT_SHA}%0A"
          MSG+="Author: ${COMMIT_AUTHOR}%0A"
          MSG+="🔴 Static Validation failed.%0A"
          MSG+="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
          echo "✓ Telegram failure notification sent"
