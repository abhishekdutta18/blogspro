name: Pulse Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    concurrency:
      group: pulse-hourly-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Generate Hourly Pulse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          NEWS_API_KEY: ${{ secrets.API_KEY_NEWS }}
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/generate-briefing.js --freq=hourly
      - name: Commit and Push
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add briefings/ index.html sitemap.xml
          git commit -m "chore: hourly pulse update [skip ci]" || echo "No changes"
          for i in {1..3}; do
            git pull --rebase origin main
            git push && exit 0
            sleep 10
          done
      - name: Notify Socials
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js --freq=hourly
