name: Daily AI Article Generation

on:
  schedule:
    - cron: '0 8 * * *' # Every day at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Generate AI Briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          NEWS_API_KEY: ${{ secrets.API_KEY_NEWS }}
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/generate-article.js

      - name: Update Sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and Push
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add posts/ index.html sitemap.xml
          git commit -m "chore: automated daily financial briefing [skip ci]" || echo "No changes to commit"
          git push
