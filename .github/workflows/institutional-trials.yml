name: 🔬 BlogsPro Institutional Trials
on:
  workflow_dispatch:
    inputs:
      freq:
        description: 'Sweep Frequency'
        required: true
        default: 'hourly'
        type: choice
        options:
          - hourly
          - daily
          - weekly
      type:
        description: 'Asset Type'
        required: true
        default: 'article'
        type: choice
        options:
          - article
          - manuscript
          - brief

jobs:
  trial-swarm:
    name: 🐝 Trial Swarm Dispatch
    runs-on: ubuntu-latest
    environment: Production # Using production secrets for high-fidelity trial
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛡️ Pre-Flight Security Check
        run: |
          if [ -z "${{ secrets.GEMINI_KEY }}" ]; then echo "❌ GEMINI_KEY is missing!"; exit 1; fi
          if [ -z "${{ secrets.GROQ_KEY }}" ]; then echo "❌ GROQ_KEY is missing!"; exit 1; fi
          echo "✅ Institutional Intelligence Keys Verified."

      - name: 🧪 Execute Trial Swarm
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN }}
          TRIALS_MODE: "true"
        run: |
          node scripts/generate-institutional-tome.js \
            --freq=${{ github.event.inputs.freq }} \
            --type=${{ github.event.inputs.type }} \
            --seed=Trial_Sweep_${{ github.run_id }} \
            --extended

  trial-deploy:
    name: 🚀 Trial Worker Update
    needs: trial-swarm
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Wrangler
        run: npm install -g wrangler

      - name: 🚀 Deploy to Trials Env
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env trials
