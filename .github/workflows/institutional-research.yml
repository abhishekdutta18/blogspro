
on:
  workflow_dispatch:
    inputs:
      freq:
        description: 'Frequency (hourly, daily, weekly, monthly)'
        required: true
        default: 'weekly'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      type:
        description: 'Type (article, tome)'
        required: true
        default: 'article'

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    name: MiroFish Consensus Swarm
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360
    outputs:
      tome_file: ${{ steps.swarm.outputs.tome_file }}
      tome_name: ${{ steps.swarm.outputs.tome_name }}
      tome_type: ${{ steps.swarm.outputs.tome_type }}
      handoff: ${{ steps.handoff.outputs.handoff }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      - name: 🛡️ Pre-Flight Check & GKE Handoff
        id: handoff
        run: |
          FREQ="${{ github.event.inputs.freq }}"
          if [[ "$FREQ" == "weekly" || "$FREQ" == "monthly" ]]; then
            echo "handoff=gke" >> $GITHUB_OUTPUT
            echo "⏭️ [Handoff] $FREQ pulse detected. Handing off to Sovereign GKE Cluster."
          else
            echo "handoff=gha" >> $GITHUB_OUTPUT
            echo "✅ [Execution] $FREQ pulse detected. Running on GHA with Simple Engine."
          fi

      - name: Execute Simple Research
        if: steps.handoff.outputs.handoff == 'gha'
        id: swarm
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ASSET_DOMAIN: "https://blogspro.in"
        run: |
          mkdir -p ./dist
          node scripts/generate-institutional-tome.js --freq="${{ github.event.inputs.freq }}" --type="${{ github.event.inputs.type }}" --force

  pdf-generation:
    name: PDF Manuscript Print
    needs: research
    if: needs.research.outputs.handoff == 'gha'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 📦 Install Dependencies
        run: npm ci || npm install


      - name: Generate PDF Manuscript
        env:
          FILE_NAME: ${{ needs.research.outputs.tome_name }}
          TYPE: ${{ needs.research.outputs.tome_type }}
          FREQUENCY: ${{ github.event.inputs.freq }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OUTPUT_DIR: "./artifacts"
        run: |
          mkdir -p ./artifacts
          node scripts/generate-pdf-worker.js

      - name: Archive Strategic Briefings to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "BlogsPro Engine"
          git config --global user.email "engine@blogspro.in"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          # Stage generated files from root directory
          git add briefings/ articles/ index.json 2>/dev/null || true
          find briefings -name "*.pdf" 2>/dev/null | xargs git add 2>/dev/null || true
          git commit -m "swarm-archival: Institutional Manuscript Update [registry: Institutional-AI]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push rejected (Attempt $i), retrying in 10s..."
            sleep 10
          done
          echo "Git Push failed after 3 attempts." && exit 1

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: institutional-pdf-${{ github.event.inputs.freq }}
          path: ./artifacts/*.pdf
          if-no-files-found: warn

  deployment:
    name: Production Dispatch
    needs: [research, pdf-generation]
    if: always() && needs.research.outputs.handoff == 'gha' && (needs.research.result == 'success' || (needs.pdf-generation.result == 'success' || needs.pdf-generation.result == 'skipped'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Dependencies
        run: npm ci || npm install


      - name: Final Archival Verification
        run: |
          echo "Institutional Manuscript Successfully Archived."
          echo "Path: ${{ needs.research.outputs.tome_file }}"

  deploy:
    name: Production Deploy
    needs: [research, pdf-generation]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: blogspro-ai
          channelId: live
