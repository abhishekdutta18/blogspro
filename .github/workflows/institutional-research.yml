name: Swarm 4.0 Institutional Research

on:
  workflow_dispatch:
    inputs:
      freq:
        description: 'Generation Frequency (weekly, monthly)'
        required: true
        default: 'weekly'
      type:
        description: 'Content Type (article, pulse)'
        required: true
        default: 'article'

jobs:
  generate-tome:
    name: High-Compute Institutional Swarm
    runs-on: ubuntu-latest
    timeout-minutes: 345 # 5 hours 45 minutes (User requested)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (V20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Execute Swarm (High-Compute)
        id: swarm
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN || 'BPRO_SWARM_SECRET_2026' }}
          # Storage & Cloudflare Access (for temple engine fetch)
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🚀 Starting Full 16-Vertical Institutional Swarm..."
          node scripts/generate-institutional-tome.js --freq=${{ github.event.inputs.freq }} --type=${{ github.event.inputs.type }}
          
      - name: Cloudflare R2 Sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📦 Uploading Institutional Tome to R2..."
          TOME_FILE=$(ls dist/swarm-*.html | head -n 1)
          TOME_NAME=$(basename "$TOME_FILE")
          npx wrangler r2 object put blogspro-assets --file="$TOME_FILE" "briefings/${{ github.event.inputs.freq }}/$TOME_NAME"
          echo "TOME_NAME=$TOME_NAME" >> $GITHUB_ENV

      - name: Governance Sync (Firestore & Index)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📡 Syncing Institutional Metadata to Firestore..."
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TITLE="Institutional Tome - $(date +'%B %Y')"
          
          # Sync to Firestore REST API
          curl -s -X POST "https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/articles" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"id\": { \"doubleValue\": $(date +%s) },
                \"title\": { \"stringValue\": \"$TITLE\" },
                \"date\": { \"stringValue\": \"$DATE\" },
                \"file\": { \"stringValue\": \"$TOME_NAME\" },
                \"frequency\": { \"stringValue\": \"${{ github.event.inputs.freq }}\" }
              }
            }"
            
          echo "✅ Institutional Research Swarm successfully completed and synced."
