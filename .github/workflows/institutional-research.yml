name: BlogsPro Institutional Intelligence Pipeline

on:
  workflow_dispatch:
    inputs:
      freq:
        description: 'Frequency (hourly, daily, weekly, monthly)'
        required: true
        default: 'weekly'
        type: choice
        options:
          - hourly
          - daily
          - weekly
          - monthly
      type:
        description: 'Type (article, tome)'
        required: true
        default: 'article'

jobs:
  research:
    name: 🐝 MiroFish Consensus Swarm
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # # environment: Production
    timeout-minutes: 360
    outputs:
      tome_file: ${{ steps.swarm.outputs.tome_file }}
      tome_name: ${{ steps.swarm.outputs.tome_name }}
      tome_type: ${{ steps.swarm.outputs.tome_type }}
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛡️ Pre-Flight Security Check
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "❌ GEMINI_API_KEY is missing! Swarm cannot start."; exit 1; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then echo "❌ GROQ_API_KEY is missing! Swarm cannot start."; exit 1; fi
          echo "✅ Institutional Intelligence Keys Verified."

      - name: 🕵️ Execute Consensus Swarm
        id: swarm
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          QWEB_API_KEY: ${{ secrets.QWEB_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EXTENDED_MODE: true
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          mkdir -p ./dist
          node scripts/generate-institutional-tome.js --freq=${{ github.event.inputs.freq }} --type=${{ github.event.inputs.type }} --extended

  pdf-generation:
    name: 📄 PDF Manuscript Print
    needs: research
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # environment: Production
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 📦 Install Dependencies
        run: npm install puppeteer @aws-sdk/client-s3

      - name: 🖨️ Generate PDF Manuscript
        env:
          FILE_NAME: ${{ needs.research.outputs.tome_name }}
          TYPE: ${{ needs.research.outputs.tome_type }}
          FREQUENCY: ${{ github.event.inputs.freq }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OUTPUT_DIR: "./artifacts"
        run: |
          mkdir -p ./artifacts
          node scripts/generate-pdf-worker.js

      - name: 🐝 Archive Strategic Briefings to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "BlogsPro Engine"
          git config --global user.email "engine@blogspro.in"
          
          # Add latest manuscripts and PDFs
          git add dist/swarm-*.html briefings/*/*.pdf
          
          # Commit with skip-ci to avoid recursive triggers
          git commit -m "🐝 swarm-archival: [Institutional Manuscript Update] [skip ci]" || echo "No changes to commit"
          
          # Reliable push with rebase
          for i in {1..3}; do
            git pull --rebase origin main
            git push && exit 0
            echo "⚠️ Push rejected (Attempt $i), retrying in 10s..."
            sleep 10
          done
          echo "❌ Git Push failed after 3 attempts." && exit 1

      - name: 🏺 Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: institutional-pdf-${{ github.event.inputs.freq }}
          path: ./artifacts/*.pdf

  deployment:
    name: 🚀 Production Dispatch
    needs: [research, pdf-generation]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # environment: Production
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install node-fetch form-data

      - name: 📡 Dispatch Institutional Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FREQUENCY: ${{ github.event.inputs.freq }}
          TYPE: ${{ github.event.inputs.type }}
        run: |
          # Use the modular notify-telegram.js to send the latest PDF
          node scripts/notify-telegram.js --freq=$FREQUENCY --type=$TYPE

      - name: 🌌 Final Archival Verification
        run: |
          echo "Institutional Manuscript Successfully Archived."
          echo "Path: ${{ needs.research.outputs.tome_file }}"
