name: BlogsPro Institutional Intelligence Pipeline

on:
  workflow_dispatch:
    inputs:
      freq:
        description: 'Frequency (weekly, monthly)'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly
      type:
        description: 'Type (article, tome)'
        required: true
        default: 'article'

jobs:
  research:
    name: 🐝 MiroFish Consensus Swarm
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      tome_file: ${{ steps.swarm.outputs.tome_file }}
      tome_name: ${{ steps.swarm.outputs.tome_name }}
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🕵️ Execute Consensus Swarm
        id: swarm
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ./dist
          node scripts/generate-institutional-tome.js --freq=${{ github.event.inputs.freq }} --type=${{ github.event.inputs.type }}

  pdf-generation:
    name: 📄 PDF Manuscript Print
    needs: research
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 📦 Install Dependencies
        run: npm install puppeteer @aws-sdk/client-s3

      - name: 🖨️ Generate PDF Manuscript
        env:
          FILE_NAME: ${{ needs.research.outputs.tome_name }}
          FREQUENCY: ${{ github.event.inputs.freq }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "blogspro-assets"
          OUTPUT_DIR: "./artifacts"
        run: |
          mkdir -p ./artifacts
          # We call the existing PDF generator script
          node scripts/generate-pdf-worker.js

      - name: 🏺 Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: institutional-pdf-${{ github.event.inputs.freq }}
          path: ./artifacts/*.pdf

  deployment:
    name: 🚀 Production Dispatch
    needs: [research, pdf-generation]
    runs-on: ubuntu-latest
    environment: Production # <--- MANUAL APPROVAL GATE
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies (Sync Utils)
        run: npm install @aws-sdk/client-s3

      - name: 💎 Sync Institutional Assets to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "blogspro-assets"
          SYNC_DIR: "./dist" # Should ideally be passed via artifacts, but for simplicity we re-run or use artifacts
        run: |
          # Note: In a hardened flow, we would download artifacts from the 'research' job
          # For now, we utilize the R2 sync utility script
          node scripts/sync-to-r2.js

      - name: 📝 Final Institutional Pulse (Sentry)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"message\": \"🏢 Production Deployment Complete: Swarm 4.0 (${{ github.event.inputs.freq }})\", \"level\": \"info\"}" \
            "https://ingest.de.sentry.io/api/4511069332832336/store/?sentry_key=c75786fd93da9331cedca5e3ec8bd9cd&sentry_version=7"
