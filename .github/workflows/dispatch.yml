name: BlogsPro Unified Dispatch Engine

on:
  schedule:
    - cron: '0 * * * *'    # Every Hour (Hourly Pulse) - Consistent across timezones
    - cron: '0 03 * * *'   # 08:30 AM IST Daily (Daily Briefing)
    - cron: '30 04 * * 0'  # 10:00 AM IST Sunday (Weekly Strategic)
    - cron: '30 05 1 * *'  # 11:00 AM IST 1st (Monthly Outlook)
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Analysis Frequency to Trigger'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - hourly
          - daily
          - weekly
          - monthly

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        shell: bash
        run: |
          node -v
          npm -v
          npm install

      - name: Execute Autonomous Briefings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          NEWS_API_KEY: ${{ secrets.API_KEY_NEWS }}
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.WEBHOOK_SECRET }}
        shell: bash
        run: |
          echo "Current Directory: $(pwd)"
          node -v
          FREQ="${{ github.event.inputs.frequency }}"
          EVENT="${{ github.event_name }}"
          CRON="${{ github.event.schedule }}"

          # 1. Hourly Market Pulse (Always for Dispatch/Hourly, or H:00 schedule)
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "hourly" ] || [ "$CRON" == "0 * * * *" ]; then
            echo "🚀 Dispatching Hourly Market Pulse..."
            node scripts/generate-briefing.js --freq=hourly
          fi

          # 2. Daily AI Briefing (Dispatch/Daily, or 08:30 AM IST schedule)
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "daily" ] || [ "$CRON" == "0 03 * * *" ]; then
            echo "📅 Dispatching Daily AI Briefing..."
            node scripts/generate-briefing.js --freq=daily
          fi

          # 3. Weekly Strategic Article (Dispatch/Weekly, or 10:00 AM IST schedule)
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "weekly" ] || [ "$CRON" == "30 04 * * 0" ]; then
            echo "📊 Dispatching Weekly Strategic Article..."
            node scripts/generate-article.js --freq=weekly
          fi

          # 4. Monthly Macro Outlook (Dispatch/Monthly, or 11:00 AM IST schedule)
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "monthly" ] || [ "$CRON" == "30 05 1 * *" ]; then
            echo "🌎 Dispatching Monthly Macro Outlook..."
            node scripts/generate-article.js --freq=monthly
          fi

      - name: Update Sitemap
        shell: bash
        run: node scripts/generate-sitemap.js

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name "BlogsPro Bot"
          git config --global user.email "bot@blogspro.in"
          git add briefings/ articles/ index.html sitemap.xml robots.txt js/
          git commit -m "chore: automated dispatch update [skip ci]" || echo "No changes to commit"
          
          # Retry loop for push (up to 3 attempts with rebase)
          for i in {1..3}; do
            git pull --rebase origin main
            git push && exit 0
            echo "⚠️ Push rejected (Attempt $i), retrying in 10s..."
            sleep 10
          done
          echo "❌ Git Push failed after 3 attempts." && exit 1

      - name: Social Notification Blast
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          echo "⏳ Waiting 30s for GitHub Pages propagation..."
          sleep 30
          
          FREQ="${{ github.event.inputs.frequency }}"
          EVENT="${{ github.event_name }}"
          CRON="${{ github.event.schedule }}"

          # 1. Hourly
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "hourly" ] || [ "$CRON" == "0 * * * *" ]; then
            node scripts/notify-telegram.js --freq=hourly
          fi

          # 2. Daily
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "daily" ] || [ "$CRON" == "0 03 * * *" ]; then
            node scripts/notify-telegram.js --freq=daily
          fi

          # 3. Weekly
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "weekly" ] || [ "$CRON" == "30 04 * * 0" ]; then
            node scripts/notify-telegram.js --freq=weekly
          fi

          # 4. Monthly
          if [ "$FREQ" == "all" ] || [ "$FREQ" == "monthly" ] || [ "$CRON" == "30 05 1 * *" ]; then
            node scripts/notify-telegram.js --freq=monthly
          fi
