name: "Deploy Sentry Webhook to Cloudflare"

on:
  push:
    branches:
      - main
    paths:
      - 'api/sentry-webhook.js'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Network
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Sentry Webhook Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy api/sentry-webhook.js --name sentry-telegram-webhook --compatibility-date 2024-03-01
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
