name: "Upstox Read-Only Snapshot"

on:
  schedule:
    # Runs at 9:00 AM and 3:30 PM IST (03:30 AM and 10:00 AM UTC) 
    # to capture market open and close snapshots
    - cron: '30 3 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force_snapshot:
        description: 'Force a full data snapshot'
        required: false
        default: 'false'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Snapshot Script
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          NODE_ENV: production
        run: node scripts/fetch-upstox-read-only.js

      - name: Archive Snapshot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstox-snapshot-${{ github.run_id }}
          path: |
            *.json
            *.log
          retention-days: 7
