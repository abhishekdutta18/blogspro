name: "SEO Engine (Static Post & Sitemap Generator)"

on:
  schedule:
    # Run every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Static Posts
        working-directory: scripts
        run: node build-static.js

      - name: Generate Sitemap
        working-directory: scripts
        run: node generate-sitemap.js

      - name: Commit Generated Pages
        run: |
          git config --global user.name "SEO Automation"
          git config --global user.email "seo@blogspro.in"
          git add p/
          git add sitemap.xml
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: hydrate background SEO static posts and sitemap" && git push origin main)
