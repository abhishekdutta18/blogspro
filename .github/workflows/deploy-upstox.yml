name: Deploy Upstox Worker

on:
  push:
    branches:
      - main
    paths:
      - 'api/upstox-worker.js'
      - 'wrangler.upstox.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@3 deploy --config wrangler.upstox.toml

      - name: Push UPSTOX_ACCESS_TOKEN secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: |
          [ -n "$UPSTOX_ACCESS_TOKEN" ] && echo "$UPSTOX_ACCESS_TOKEN" | npx wrangler@3 secret put UPSTOX_ACCESS_TOKEN --config wrangler.upstox.toml || echo "UPSTOX_ACCESS_TOKEN not set — skipping"

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Failure Alert
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "🚨 [BlogsPro] Upstox Worker Deployment Failed! Check GitHub Actions."
