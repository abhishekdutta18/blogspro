name: Deploy Upstox Worker

on:
  push:
    branches:
      - main
    paths:
      - 'api/upstox-worker.js'
      - 'wrangler.upstox.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@3 deploy --env upstox

      - name: Push UPSTOX_ACCESS_TOKEN secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: |
          [ -n "$UPSTOX_ACCESS_TOKEN" ] && echo "$UPSTOX_ACCESS_TOKEN" | npx wrangler@3 secret put UPSTOX_ACCESS_TOKEN --env upstox || echo "UPSTOX_ACCESS_TOKEN not set — skipping"

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Failure Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          [ -n "$TELEGRAM_BOT_TOKEN" ] && curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 [BlogsPro] Upstox Worker Deploy Failed%0Ahttps://github.com/${REPO}/actions/runs/${RUN_ID}" \
            -d "disable_web_page_preview=true" || echo "Telegram not configured"
