name: Sentry Self-Healing Monitor

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify Sentry Token
        run: |
          if [ -z "${{ secrets.SENTRY_AUTH_TOKEN }}" ]; then
            echo "❌ Sentry Auth Token is missing. Please add SENTRY_AUTH_TOKEN to GitHub Secrets."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Sentry Monitor
        env:
          SENTRY_ORG: "o4511069230530560"
          SENTRY_PROJECT: "blogspro"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/auto-resolve-sentry.js
