name: "Sentry Error Auto-Resolver"

on:
  schedule:
    - cron: '0 * * * *' # Run at minute 0 of every hour
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  auto-resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Pull Unresolved Sentry Issues
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'abhishek-dutta'
          SENTRY_PROJECT: 'javascript'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/auto-resolve-sentry.js
