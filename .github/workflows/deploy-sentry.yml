name: Deploy Sentry Webhook Worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/sentry/index.js'
      - 'workers/sentry/wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Network
        working-directory: workers/sentry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          npx wrangler@3 deploy
          echo "$TELEGRAM_TOKEN" | npx wrangler@3 secret put TELEGRAM_TOKEN
          echo "$TELEGRAM_TO" | npx wrangler@3 secret put TELEGRAM_TO
