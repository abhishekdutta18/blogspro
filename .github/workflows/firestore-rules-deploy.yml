      - name: Validate required secrets
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          [ -n "$FIREBASE_SERVICE_ACCOUNT_B64" ] || (echo "Missing FIREBASE_SERVICE_ACCOUNT_B64" && exit 1)
          [ -n "$FIREBASE_PROJECT_ID" ] || (echo "Missing FIREBASE_PROJECT_ID" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write and validate service account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_B64" | base64 --decode > "${HOME}/gcp-key.json"
          jq -e . "${HOME}/gcp-key.json" > /dev/null
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcp-key.json" >> "$GITHUB_ENV"

      - name: Deploy firestore.rules
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase --version
          firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive
