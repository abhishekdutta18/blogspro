name: Firestore Rules Deploy
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firebase.json
  workflow_dispatch:

jobs:
  deploy-firestore-rules:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate required secrets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing required secret: FIREBASE_SERVICE_ACCOUNT"
            exit 1
          fi
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing required secret: FIREBASE_PROJECT_ID"
            exit 1
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write and validate service account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cat > "${HOME}/gcp-key.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          JSON
          jq -e . "${HOME}/gcp-key.json" > /dev/null
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcp-key.json" >> "$GITHUB_ENV"

      - name: Firebase auth preflight
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase --version
          firebase projects:list --json > /dev/null
          firebase use "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Deploy firestore.rules
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive
