name: Firestore Rules Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firebase.json
  workflow_dispatch:

jobs:
  deploy-firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate project ID
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          [ -n "$FIREBASE_PROJECT_ID" ] || (echo "Missing FIREBASE_PROJECT_ID" && exit 1)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy firestore.rules
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase --version
          firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive

  notify-failure:
    name: Alert Firebase Deploy Failure
    runs-on: ubuntu-latest
    needs: deploy-firestore-rules
    if: failure()
    steps:
      - name: Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ *Firestore Rules Deploy Failed*%0A%0A"
          MSG+="📦 Commit: [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})%0A"
          MSG+="🔴 The automatic Firebase deployment job failed. Check credentials or syntax.%0A"
          MSG+="[View execution details →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true"
          else
            echo "Telegram token missing, skipping alert."
          fi
