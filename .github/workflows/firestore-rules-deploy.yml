name: Firestore Rules Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firebase.json
  workflow_dispatch:

jobs:
  deploy-firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate required secrets
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          [ -n "$FIREBASE_TOKEN" ] || (echo "Missing FIREBASE_TOKEN" && exit 1)
          [ -n "$FIREBASE_PROJECT_ID" ] || (echo "Missing FIREBASE_PROJECT_ID" && exit 1)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy firestore.rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase --version
          firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" --non-interactive
