name: Prewarm KV with briefings/articles

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "articles/weekly/index.json"
      - "briefings/**/index.json"

jobs:
  prewarm:
    if: github.repository_owner == 'abhishekdutta18'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Prewarm GCP Storage
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install
          node scripts/prewarm-gcp.js
