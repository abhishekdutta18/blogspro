name: Institutional Secret Synchronizer
 
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force Full Reset'
        required: false
        default: 'false'
  push:
    paths:
      - 'scripts/sync-secrets.mjs'
      - '.github/workflows/sync-secrets.yml'

jobs:
  sync:
    name: Propagate Cluster Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install wrangler -g && npm install
        
      - name: Execute Synchronizer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # All other secrets will be pulled from repo secrets context automatically if they exist
          VAULT_MASTER_KEY: ${{ secrets.VAULT_MASTER_KEY }}
          SWARM_INTERNAL_TOKEN: ${{ secrets.SWARM_INTERNAL_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node scripts/sync-secrets.mjs
