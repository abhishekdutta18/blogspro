<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogsPro Swarm Terminal | Institutional Real-Time Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #BFA100;
            --gold-dim: rgba(191, 161, 0, 0.4);
            --bg: #0A0A0A;
            --surface: #141414;
            --border: #2A2A2A;
            --text: #E0E0E0;
            --success: #00FF9D;
            --warning: #FFBF00;
            --error: #FF4D4D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }

        /* --- Header --- */
        header {
            height: 60px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            align-items: center;
            padding: 0 30px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            justify-content: space-between;
            z-index: 100;
        }

        .title-block { display: flex; align-items: center; gap: 15px; }
        .logo { color: var(--gold); font-weight: 700; letter-spacing: 2px; font-size: 20px; }
        .status-pill { 
            background: var(--gold-dim); 
            color: var(--gold); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid var(--gold);
        }

        /* --- Layout --- */
        main {
            display: grid;
            grid-template-columns: 400px 1fr;
            grid-template-rows: 1fr 300px;
            height: calc(100vh - 60px);
        }

        /* --- Sidebar: Progress Matrix --- */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        h3 { 
            color: var(--gold); 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vertical-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .vertical-node {
            aspect-ratio: 1;
            background: #1A1A1A;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            text-align: center;
            color: #666;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vertical-node.active { 
            border-color: var(--gold); 
            color: var(--gold); 
            box-shadow: 0 0 15px var(--gold-dim);
            animation: pulse 2s infinite;
        }

        .vertical-node.complete { 
            border-color: var(--success); 
            color: var(--success); 
            background: rgba(0, 255, 157, 0.05);
        }

        .vertical-node i { font-size: 14px; margin-bottom: 5px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* --- Trace Console --- */
        .console {
            grid-row: 2;
            grid-column: 1 / 3;
            background: #000;
            border-top: 1px solid var(--border);
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry { margin-bottom: 5px; display: flex; gap: 15px; }
        .log-time { color: var(--gold); opacity: 0.6; }
        .log-msg { color: #BBB; }
        .log-msg.highlight { color: var(--gold); font-weight: 700; }
        .log-msg.success { color: var(--success); }

        /* --- Workspace Area --- */
        .workspace {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        .progress-container {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .progress-bar-bg {
            height: 8px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #8A7500, var(--gold));
            width: 0%;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px var(--gold);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .metric-card {
            background: #1A1A1A;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
        }

        .metric-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .metric-value { font-size: 24px; color: var(--gold); font-weight: 700; }

        /* --- Background Animation --- */
        .bg-glow {
            position: fixed;
            top: 20%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-dim) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <div class="title-block">
            <span class="logo"><img src="logo.svg" alt="BlogsPro" height="24" style="display:inline-block;height:24px;width:auto;vertical-align:middle"> 4.0</span>
            <span class="status-pill" id="global-status">SWARM_IDLE</span>
        </div>
        <div class="control-block">
            <span id="current-job" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #666;">NO_ACTIVE_JOB</span>
        </div>
    </header>

    <main>
        <section class="sidebar">
            <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Vertical Grid</h3>
            <div class="vertical-grid" id="node-grid">
                <!-- 16 Nodes generated via JS -->
            </div>

            <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Metrics</h3>
            <div class="metrics-grid" style="grid-template-columns: 1fr;">
                <div class="metric-card">
                    <div class="metric-label">Token Rotation</div>
                    <div class="metric-value" id="model-usage" style="font-size: 14px;">Groq / Gemini / Mistral</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Estimated Word Count</div>
                    <div class="metric-value" id="word-density">---</div>
                </div>
            </div>
        </section>

        <section class="workspace">
            <div class="progress-container">
                <div class="progress-header">
                    <span id="stage-label" style="color: var(--gold); font-weight: 700;">INITIALIZING_ENVIRONMENT</span>
                    <span id="percentage-label">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Consensus Desk</div>
                    <div class="metric-value" id="consensus-status" style="font-size: 16px; color: #666;">WAITING...</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Fidelity Governor</div>
                    <div class="metric-value" id="governor-status" style="font-size: 16px; color: #666;">STANDBY</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Deep-Reflect</div>
                    <div class="metric-value" id="reflect-status" style="font-size: 16px; color: #666;">ACTIVE</div>
                </div>
            </div>
        </section>

        <section class="console" id="log-console">
            <div class="log-entry">
                <span class="log-time">[11:35:40]</span>
                <span class="log-msg highlight">SYSTEM_START: Institutional Swarm Hub Active. Awaiting Job Dispatch...</span>
            </div>
        </section>
    </main>

    <script type="module">
        import * as Y from 'https://cdn.skypack.dev/yjs';
        import { WebsocketProvider } from 'https://cdn.skypack.dev/y-websocket';

        const doc = new Y.Doc();
        const wsProvider = new WebsocketProvider('wss://blogspro-miro-sync.abhishek-dutta1996.workers.dev', 'global-swarm-bridge', doc);
        
        const progressMap = doc.getMap('swarm-progress');
        const nodeGrid = document.getElementById('node-grid');
        const logConsole = document.getElementById('log-console');

        // Initialize 16 verticals
        const verticals = [
            "Macro", "Banking", "Cards", "Equities", "Debt", "FX", 
            "Digital", "Reg", "Comm", "EM", "Asset", "Scribe", 
            "Capital", "Insure", "GIFT", "Pay"
        ];

        verticals.forEach((v, index) => {
            const node = document.createElement('div');
            node.className = 'vertical-node';
            node.id = `node-${index}`;
            node.innerHTML = `<i>${v.substring(0, 3)}</i>${v}`;
            nodeGrid.appendChild(node);
        });

        function addLog(msg, type = '') {
            const time = new Date().toLocaleTimeString('en-IN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-msg ${type}">${msg}</span>
            `;
            logConsole.prepend(entry);
        }

        progressMap.observe(event => {
            // Find the latest update
            let latestJob = null;
            let latestTime = 0;
            
            for (const [jobId, data] of progressMap) {
                if (data.timestamp > latestTime) {
                    latestTime = data.timestamp;
                    latestJob = data;
                }
            }

            if (latestJob) {
                updateUI(latestJob);
            }
        });

        function updateUI(data) {
            document.getElementById('current-job').innerText = data.jobId;
            document.getElementById('global-status').innerText = `SWARM_${data.stage}`;
            document.getElementById('stage-label').innerText = data.message;

            // Handle progress bars and percentages
            if (data.stage === 'VERTICAL_START') {
                const percent = Math.round((data.index / data.total) * 90);
                document.getElementById('progress-fill').style.width = `${percent}%`;
                document.getElementById('percentage-label').innerText = `${percent}%`;
                
                const node = document.getElementById(`node-${data.index}`);
                if (node) {
                    node.classList.add('active');
                    addLog(`[${data.vertical}] Swarm analyzing sector context...`);
                }
            }

            if (data.stage === 'VERTICAL_COMPLETE') {
                // Find node by name if possible or use latest active
                const activeNodes = document.querySelectorAll('.vertical-node.active');
                activeNodes.forEach(n => {
                    n.classList.remove('active');
                    n.classList.add('complete');
                });
                addLog(`[${data.vertical}] Sector Analysis Complete. Fidelity Check Passed.`, 'success');
            }

            if (data.stage === 'CONSENSUS_START') {
                document.getElementById('consensus-status').innerText = '10-AGENT_ACTIVE';
                document.getElementById('consensus-status').style.color = 'var(--gold)';
                addLog('🤝 Consensus Desk: Multi-Agent Simulation Launched.', 'highlight');
            }

            if (data.stage === 'GOVERNOR_START') {
                document.getElementById('governor-status').innerText = 'PROTECTING';
                document.getElementById('governor-status').style.color = 'var(--success)';
                addLog('⚖️ Fidelity Governor: Stripping MD Pollution & Repairing JSON...', 'highlight');
            }
        }
    </script>
</body>
</html>
