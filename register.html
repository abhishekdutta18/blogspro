<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — BlogsPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #080d1a; --navy2:  #0f1628; --navy3:  #1a2340;
      --gold:   #c9a84c; --gold2:  #f0cc6e; --cream:  #f5f0e8;
      --muted:  #8896b3; --border: rgba(201,168,76,0.2); --red: #ef4444;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }
    body {
      background: var(--navy); color: var(--cream);
      font-family: var(--sans); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(37,99,235,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .box {
      background: var(--navy2); border: 1px solid var(--border);
      padding: 3rem 2.5rem; width: 100%; max-width: 440px;
      position: relative; animation: up 0.4s ease both;
    }
    @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .box::before {
      content: ''; position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    }
    .brand {
      font-family: var(--serif); font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
    .subtitle { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }
    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 0.85rem 1rem; border-radius: 3px; font-family: var(--sans);
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      margin-bottom: 0.75rem; border: 1px solid var(--border);
      background: var(--navy3); color: var(--cream);
    }
    .social-btn:hover { background: var(--navy); border-color: rgba(201,168,76,0.5); transform: translateY(-1px); }
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .form-row { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: var(--navy); border: 1px solid var(--border);
      color: var(--cream); padding: 0.8rem 1rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
    .role-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
    .role-card {
      border: 1px solid var(--border); padding: 0.75rem 0.5rem;
      border-radius: 3px; cursor: pointer; text-align: center;
      transition: all 0.2s; background: var(--navy);
    }
    .role-card:hover { border-color: var(--gold); }
    .role-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .role-card input { display: none; }
    .role-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .role-name { font-size: 0.75rem; font-weight: 600; color: var(--cream); }
    .role-desc { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; line-height: 1.3; }
    .btn-register {
      width: 100%; background: var(--gold); color: var(--navy);
      border: none; padding: 1rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-register:hover { background: var(--gold2); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 0.75rem 1rem; border-radius: 3px; font-size: 0.85rem; margin-top: 1rem; display: none; }
    .back-link { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.82rem; color: var(--muted); transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }
    .loading-ring { width: 16px; height: 16px; border: 2px solid rgba(8,13,26,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: inherit; text-decoration: none; }
  </style>
  <!-- Sentry Error Tracking v10.44.0 -->
  <script src="https://browser.sentry-cdn.com/10.44.0/bundle.min.js"
    integrity="sha384-sx+UyjbtMU5ociD00tpUP0LC8A78wmbbIzMUl3+Y35sUqIweqvkXE43dDRqQDEO8"
    crossorigin="anonymous"></script>
  <script>
  Sentry.init({
    dsn: "https://c75786fd93da9331cedca5e3ec8bd9cd@o4511069230530560.ingest.de.sentry.io/4511069332832336",
    environment: window.location.hostname === "blogspro.in" ? "production" : "development",
    release: "blogspro@2026-03-19",
    sampleRate: 1.0,
    tracesSampleRate: 0.1,
    ignoreErrors: [
      "ResizeObserver loop limit exceeded",
      "ResizeObserver loop completed with undelivered notifications",
      "Network request failed",
      "Failed to fetch",
      "Load failed",
    ],
  });
  window.setSentryUser = function(u) { Sentry.setUser(u); };
  window.trackEvent   = function(name, data) {
    Sentry.addBreadcrumb({ message: name, data: data, level: "info" });
  };
  </script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DED9GTRR3E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DED9GTRR3E');
  </script>
</head>
<body>
<div class="box">
  <div class="brand">BlogsPro</div>
  <div class="subtitle">Create Account</div>
 
  <!-- Google -->
  <button class="social-btn" id="googleBtn" onclick="registerGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign up with Google
    <div class="loading-ring" id="googleRing"></div>
  </button>
 
  <!-- GitHub -->
  <button class="social-btn" id="githubBtn" onclick="registerGitHub()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--cream)">
      <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
    </svg>
    Sign up with GitHub
    <div class="loading-ring" id="githubRing"></div>
  </button>
 
  <div class="divider"><span>or register with email</span></div>
 
  <div class="form-row">
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your name" />
  </div>
  <div class="form-row">
    <label>Email Address</label>
    <input type="email" id="regEmail" placeholder="you@example.com" />
  </div>
  <div class="form-row">
    <label>Password</label>
    <input type="password" id="regPass" placeholder="Min. 6 characters" />
  </div>
 
  <div class="form-row">
    <label>I want to apply as</label>
    <div class="role-grid">
      <label class="role-card selected" id="card-reader" onclick="selectRole('reader')">
        <div class="role-icon">👤</div>
        <div class="role-name">Reader</div>
        <div class="role-desc">Read & save articles</div>
      </label>
      <label class="role-card" id="card-editor" onclick="selectRole('editor')">
        <div class="role-icon">✏️</div>
        <div class="role-name">Editor</div>
        <div class="role-desc">Request write access</div>
      </label>
      <label class="role-card" id="card-coauthor" onclick="selectRole('coauthor')">
        <div class="role-icon">🖊️</div>
        <div class="role-name">Co-Author</div>
        <div class="role-desc">Request publishing access</div>
      </label>
    </div>
    <div style="margin-top:0.55rem;font-size:0.74rem;color:var(--muted)">
      New accounts start as Reader. Editor and Co-Author requests require admin approval.
    </div>
  </div>
 
  <button class="btn-register" id="regBtn" onclick="doRegister()">
    <span id="regBtnText">Create Account</span>
    <div class="loading-ring" id="regRing" style="border-top-color:var(--navy);border-color:rgba(8,13,26,0.3)"></div>
  </button>
 
  <div class="error-msg" id="errorMsg"></div>
 
  <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--muted)">
    Already have an account? <a href="login.html" style="color:var(--gold)">Sign in →</a>
  </p>
  <a class="back-link" href="index.html">← Back to blog</a>
</div>
 
<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged,
    createUserWithEmailAndPassword, updateProfile,
    signInWithPopup, GoogleAuthProvider, GithubAuthProvider
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
    authDomain: "blogspro-ai.firebaseapp.com",
    projectId: "blogspro-ai",
    storageBucket: "blogspro-ai.firebasestorage.app",
    messagingSenderId: "940428277283",
    appId: "1:940428277283:web:d3bb414f0992718ca76396"
  };
 
  // FIX: No hardcoded ADMIN_UID — use Firestore role check
  const app    = initializeApp(firebaseConfig);
  const auth   = getAuth(app);
  const db     = getFirestore(app);
  const google = new GoogleAuthProvider();
  const github = new GithubAuthProvider();
 
  let selectedRole = 'reader';

  async function redirectByRole(user) {
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      const role = snap.exists() ? snap.data().role : null;
      window.location.href = role === 'admin' ? 'admin.html' : 'account.html';
    } catch(_) {
      window.location.href = 'account.html';
    }
  }
 
  onAuthStateChanged(auth, user => {
    if (user) redirectByRole(user);
  });
 
  window.selectRole = (role) => {
    selectedRole = role;
    ['reader','editor','coauthor'].forEach(r => {
      document.getElementById(`card-${r}`).classList.toggle('selected', r === role);
    });
  };
 
  async function createUserDoc(user, extraName = '') {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid:       user.uid,
        name:      extraName || user.displayName || '',
        email:     user.email || '',
        bio:       '',
        photoURL:  user.photoURL || '',
        role:      'reader',
        requestedRole: selectedRole,
        createdAt: serverTimestamp()
      });
    }
  }
 
  window.doRegister = async () => {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name)  { showError('Please enter your name.'); return; }
    if (!email) { showError('Please enter your email.'); return; }
    if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
    setLoading(true); hideError();
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await createUserDoc(cred.user, name);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showError(friendlyError(e.code));
      setLoading(false);
    }
  };
 
  window.registerGoogle = async () => {
    setLoadingSocial('google', true); hideError();
    try {
      const result = await signInWithPopup(auth, google);
      await createUserDoc(result.user);
      window.location.href = 'account.html';
    } catch(e) {
      showError(friendlyError(e.code));
      setLoadingSocial('google', false);
    }
  };
 
  window.registerGitHub = async () => {
    setLoadingSocial('github', true); hideError();
    try {
      const result = await signInWithPopup(auth, github);
      await createUserDoc(result.user);
      window.location.href = 'account.html';
    } catch(e) {
      showError(friendlyError(e.code));
      setLoadingSocial('github', false);
    }
  };
 
  function setLoading(on) {
    document.getElementById('regBtn').disabled = on;
    document.getElementById('regRing').style.display    = on ? 'block' : 'none';
    document.getElementById('regBtnText').style.display = on ? 'none'  : 'inline';
  }
 
  function setLoadingSocial(p, on) {
    const map = { google: { btn:'googleBtn', ring:'googleRing' }, github: { btn:'githubBtn', ring:'githubRing' } };
    document.getElementById(map[p].btn).disabled = on;
    document.getElementById(map[p].ring).style.display = on ? 'block' : 'none';
  }
 
  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
  function hideError()    { document.getElementById('errorMsg').style.display = 'none'; }
 
  function friendlyError(code) {
    const m = {
      'auth/email-already-in-use': 'This email is already registered. Try signing in.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/weak-password':        'Password is too weak. Use at least 6 characters.',
      'auth/popup-closed-by-user': 'Sign-up popup was closed.',
    };
    return m[code] || 'Registration failed. Please try again.';
  }
</script>
</body>
</html>
