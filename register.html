<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — BlogsPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #080d1a; --navy2:  #0f1628; --navy3:  #1a2340;
      --gold:   #c9a84c; --gold2:  #f0cc6e; --cream:  #f5f0e8;
      --muted:  #8896b3; --border: rgba(201,168,76,0.2); --red: #ef4444;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }
    body {
      background: var(--navy); color: var(--cream);
      font-family: var(--sans); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(37,99,235,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .box {
      background: var(--navy2); border: 1px solid var(--border);
      padding: 3rem 2.5rem; width: 100%; max-width: 440px;
      position: relative; animation: up 0.4s ease both;
    }
    @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .box::before {
      content: ''; position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    }
    .brand {
      font-family: var(--serif); font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
      text-align: center;
    }
    .subtitle { font-size: 0.78rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; text-align: center; }
    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 0.85rem 1rem; border-radius: 3px; font-family: var(--sans);
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      margin-bottom: 0.75rem; border: 1px solid var(--border);
      background: var(--navy3); color: var(--cream);
    }
    .social-btn:hover { background: var(--navy); border-color: rgba(201,168,76,0.5); transform: translateY(-1px); }
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .form-row { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: var(--navy); border: 1px solid var(--border);
      color: var(--cream); padding: 0.8rem 1rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
    .role-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
    .role-card {
      border: 1px solid var(--border); padding: 0.75rem 0.5rem;
      border-radius: 3px; cursor: pointer; text-align: center;
      transition: all 0.2s; background: var(--navy);
    }
    .role-card:hover { border-color: var(--gold); }
    .role-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .role-card input { display: none; }
    .role-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .role-name { font-size: 0.75rem; font-weight: 600; color: var(--cream); }
    .role-desc { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; line-height: 1.3; }
    .btn-register {
      width: 100%; background: var(--gold); color: var(--navy);
      border: none; padding: 1rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-register:hover { background: var(--gold2); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 0.75rem 1rem; border-radius: 3px; font-size: 0.85rem; margin-top: 1rem; display: none; }
    .back-link { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.82rem; color: var(--muted); transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }
    .loading-ring { width: 16px; height: 16px; border: 2px solid rgba(8,13,26,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- Sentry Configuration -->
  <script src="js/sentry-init-v2.js"></script>
</head>
<body>
<div class="box">
  <div class="brand"><img src="logo.svg" alt="BlogsPro" height="32" style="display:block;height:32px;width:auto;margin:0 auto"></div>
  <div class="subtitle">Institutional Enrollment</div>
 
  <!-- Google (Direct Handshake) -->
  <div id="googleBtn" style="margin-bottom: 1.2rem; min-height: 44px; display: flex; justify-content: center;"></div>
 
  <!-- GitHub -->
  <button class="social-btn" id="githubBtn" onclick="signUpGitHub()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--cream)">
      <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
    </svg>
    Sign up with GitHub
    <div class="loading-ring" id="githubRing"></div>
  </button>
 
  <div class="divider"><span>or register with email</span></div>
  <form id="regForm" method="POST" onsubmit="doRegister(); return false;">
    <div class="form-row">
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your name" />
  </div>
  <div class="form-row">
    <label>Email Address</label>
    <input type="email" id="regEmail" placeholder="you@example.com" />
  </div>
  <div class="form-row">
    <label>Password</label>
    <input type="password" id="regPass" placeholder="Min. 6 characters" />
  </div>
 
  <div class="form-row">
    <label>Access Role Application</label>
    <div class="role-grid">
      <label class="role-card selected" id="card-reader" onclick="selectRole('reader')">
        <div class="role-icon">👤</div>
        <div class="role-name">Reader</div>
        <div class="role-desc">Standard access</div>
      </label>
      <label class="role-card" id="card-editor" onclick="selectRole('editor')">
        <div class="role-icon">✏️</div>
        <div class="role-name">Editor</div>
        <div class="role-desc">Draft access</div>
      </label>
      <label class="role-card" id="card-coauthor" onclick="selectRole('coauthor')">
        <div class="role-icon">🖊️</div>
        <div class="role-name">Co-Author</div>
        <div class="role-desc">Full access</div>
      </label>
    </div>
  </div>
 
    <button class="btn-register" id="regBtn" type="submit">
      <span id="regBtnText">Secure Enrollment</span>
      <div class="loading-ring" id="regRing" style="border-top-color:var(--navy);border-color:rgba(8,13,26,0.3)"></div>
    </button>
  </form>
 
  <div class="error-msg" id="errorMsg"></div>
 
  <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--muted)">
    Already have an account? <a href="login.html" style="color:var(--gold)">Sign in →</a>
  </p>
  <a class="back-link" href="index.html">← Return to Ledger</a>
</div>
 
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GithubAuthProvider, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { api } from "./js/services/api.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
    authDomain: "blogspro-ai.firebaseapp.com",
    projectId: "blogspro-ai",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Handle Redirect Result on Load
  window.addEventListener('load', async () => {
    // 1. Check for Pending GitHub/Firebase Redirects
    try {
      const result = await getRedirectResult(auth);
      if (result) await handleAuthSuccess(result.user);
    } catch (e) {
      console.error("Redirect auth error:", e);
    }

    // 2. Initialize GSI (Zero-Firebase-Link Flow)
    if (window.google) {
      google.accounts.id.initialize({
        client_id: "940428277283-bdgk8sf3d0q7jls327e0j8cce5l9a78q.apps.googleusercontent.com",
        login_uri: "https://blogspro-auth.abhishek-dutta1996.workers.dev/auth/callback/google",
        ux_mode: "redirect",
        auto_select: true
      });
      
      // Render Branded Button
      google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        { theme: "filled_blue", size: "large", width: 370 }
      );

      // Trigger One Tap Overlay
      google.accounts.id.prompt();
    }
  });

  async function handleAuthSuccess(user) {
    const idToken = await user.getIdToken();
    localStorage.setItem("fb_token", idToken);
    
    // Check if admin (role check on worker)
    const me = await api.auth.me();
    if (me?.authenticated && me.user?.role === "admin") {
      window.location.href = "admin.html";
    } else {
      const role = me.user?.role || "reader";
      window.location.href = "login.html?error=unauthorized&reason=" + role;
    }
  }

  // Auth Handlers
  window.signUpGitHub = async () => {
    setLoading('github', true);
    try {
      const provider = new GithubAuthProvider();
      await signInWithRedirect(auth, provider);
    } catch (e) {
      showError(e.message || "GitHub Sign-up failed.");
      setLoading('github', false);
    }
  };

  window.doRegister = async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!email || !pass || !confirm) { showError('Please fill all fields.'); return; }
    if (pass !== confirm) { showError('Passwords do not match.'); return; }
    if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading('email', true); hideError();
    try {
      const result = await createUserWithEmailAndPassword(auth, email, pass);
      await handleAuthSuccess(result.user);
    } catch (e) {
      showError(e.message || "Registration failed.");
      setLoading('email', false);
    }
  };

  function setLoading(provider, on) {
    const map = {
      github: { btn: 'githubBtn', ring: 'githubRing' },
      email:  { btn: 'registerBtn', ring: 'emailRing', txt: 'btnText' },
    };
    const { btn, ring, txt } = map[provider];
    const button = document.getElementById(btn);
    if (!button) return;
    button.disabled = on;
    const ringEl = document.getElementById(ring);
    if (ringEl) ringEl.style.display = on ? 'block' : 'none';
    if (txt) {
      const txtEl = document.getElementById(txt);
      if (txtEl) txtEl.style.display = on ? 'none' : 'inline';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }

  function hideError() {
    const el = document.getElementById('errorMsg');
    if (el) el.style.display = 'none';
  }
</script>
</body>
</html>
