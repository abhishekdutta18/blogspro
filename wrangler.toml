[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

# --- PULSE ORCHESTRATOR ---
[env.pulse]
name = "blogspro-pulse"
main = "scripts/pulse-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.pulse.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
BASE_URL = "https://blogspro.in"
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

[[env.pulse.services]]
binding = "DATA_HUB"
service = "blogspro-data-hub"

[[env.pulse.services]]
binding = "RELEVANCE"
service = "blogspro-relevance"

[[env.pulse.services]]
binding = "AUDITOR"
service = "blogspro-auditor"

[[env.pulse.services]]
binding = "SEO_MANAGER"
service = "blogspro-seo"

[[env.pulse.r2_buckets]]
binding = "BLOOMBERG_ASSETS"
bucket_name = "blogspro-assets"

[[env.pulse.services]]
binding = "TEMPLATE_ENGINE"
service = "blogspro-templates"

[[env.pulse.kv_namespaces]]
binding = "KV"
id = "9caa7afdf7e94adb99cecf221275d63d"

[[env.pulse.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregator"

[[env.pulse.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "swarm_telemetry"

[env.pulse.triggers]
crons = ["0 * * * *", "0 4 * * *", "0 5 * * 1", "0 6 1 * *"]

# --- TEMPLATE ENGINE WORKER ---
[env.templates]
name = "blogspro-templates"
main = "scripts/template-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- DATA HUB WORKER ---
[env.data-hub]
name = "blogspro-data-hub"
main = "scripts/data-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.data-hub.vars]
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

[[env.data-hub.r2_buckets]]
binding = "BLOOMBERG_ASSETS"
bucket_name = "blogspro-assets"

[[env.data-hub.kv_namespaces]]
binding = "KV"
id = "9caa7afdf7e94adb99cecf221275d63d"

# --- RELEVANCE WORKER ---
[env.relevance]
name = "blogspro-relevance"
main = "scripts/relevance-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.relevance.vars]
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

# --- AUDITOR WORKER ---
[env.auditor]
name = "blogspro-auditor"
main = "scripts/auditor-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.auditor.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

# --- SEO MANAGER WORKER ---
[env.seo]
name = "blogspro-seo"
main = "scripts/seo-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.seo.vars]
BASE_URL = "https://blogspro.in"
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

[[env.seo.r2_buckets]]
binding = "BLOOMBERG_ASSETS"
bucket_name = "blogspro-assets"

[[env.seo.kv_namespaces]]
binding = "KV"
id = "9caa7afdf7e94adb99cecf221275d63d"

# --- MIRO SYNC BRIDGE ---
[env.miro-sync]
name = "blogspro-miro-sync"
main = "scripts/miro-sync-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[[env.miro-sync.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSync"

[[env.miro-sync.r2_buckets]]
binding = "snapshots"
bucket_name = "blogspro-affine-snapshots"

# --- MANUSCRIPT AGGREGATOR WORKER ---
[env.manuscript]
name = "blogspro-manuscript"
main = "scripts/manuscript-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[[env.manuscript.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregator"

# --- MIROFISH WORKER ---
[env.mirofish]
name = "blogspro-mirofish"
main = "scripts/mirofish-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.mirofish.vars]
SWARM_INTERNAL_TOKEN = "BPRO_SWARM_SECRET_2026"

[[env.mirofish.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSync"

[durable_objects]
bindings = [
  { name = "MIRO_SYNC_DO", class_name = "MiroSync" },
  { name = "INGESTOR_DO", class_name = "DataIngestor" },
  { name = "MANUSCRIPT_DO", class_name = "ManuscriptAggregator" }
]

[[migrations]]
tag = "v1"
new_classes = ["MiroSync"]

[[migrations]]
tag = "v2"
new_classes = ["DataIngestor"]

[[migrations]]
tag = "v3"
new_classes = ["ManuscriptAggregator"]
