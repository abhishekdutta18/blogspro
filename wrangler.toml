# BlogsPro 5.0 - Multi-Tier Swarm Configuration
# ============================================

[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

# --- PULSE ORCHESTRATOR ---
[env.pulse]
name = "blogspro-pulse"
main = "scripts/pulse-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.pulse.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
FIREBASE_STORAGE_BUCKET = "blogspro-ai.firebasestorage.app"
BASE_URL = "https://blogspro.in"
PROJECT_DOMAIN = "blogspro.ai"
GROQ_MODEL = "llama-3.3-70b-versatile"
GEMINI_MODEL = "gemini-1.5-pro"
MISTRAL_MODEL = "mistral-large-latest"
SENTRY_DSN = "https://c75786fd93da9331cedca5e3ec8bd9cd@o4511069230530560.ingest.de.sentry.io/4511069332832336"

[[env.pulse.services]]
binding = "DATA_HUB"
service = "blogspro-data-hub"

[[env.pulse.services]]
binding = "RELEVANCE"
service = "blogspro-relevance"

[[env.pulse.services]]
binding = "AUDITOR"
service = "blogspro-auditor"

[[env.pulse.services]]
binding = "TEMPLATE_ENGINE"
service = "blogspro-templates"

[[env.pulse.services]]
binding = "SEO_MANAGER"
service = "blogspro-seo"

# Pulse consumes DOs from Miro-Sync
[[env.pulse.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSync"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "INGESTOR_DO"
class_name = "DataIngestor"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregator"
script_name = "blogspro-miro-sync"

[[env.pulse.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "swarm_telemetry"

[env.pulse.triggers]
crons = ["0 * * * *", "15 4 * * *"]

# --- MIRO SYNC BRIDGE (Durable Object Home) ---
[env.miro-sync]
name = "blogspro-miro-sync"
main = "scripts/miro-sync-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.miro-sync.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

[[env.miro-sync.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSync"

[[env.miro-sync.durable_objects.bindings]]
name = "INGESTOR_DO"
class_name = "DataIngestor"

[[env.miro-sync.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregator"

[[env.miro-sync.r2_buckets]]
binding = "snapshots"
bucket_name = "blogspro-affine-snapshots"

# --- NEWSLETTER WORKER ---
[env.newsletter]
name = "blogspro-newsletter"
main = "api/newsletter-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- MIROFISH WORKER ---
[env.mirofish]
name = "blogspro-mirofish"
main = "scripts/mirofish-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[[env.mirofish.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSync"
script_name = "blogspro-miro-sync"

# --- DATA HUB WORKER ---
[env.data-hub]
name = "blogspro-data-hub"
main = "scripts/data-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- RELEVANCE WORKER ---
[env.relevance]
name = "blogspro-relevance"
main = "scripts/relevance-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- AUDITOR WORKER ---
[env.auditor]
name = "blogspro-auditor"
main = "scripts/auditor-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- SEO MANAGER WORKER ---
[env.seo]
name = "blogspro-seo"
main = "scripts/seo-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- TEMPLATE ENGINE ---
[env.templates]
name = "blogspro-templates"
main = "scripts/template-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- GLOBAL MIGRATIONS ---
[[migrations]]
tag = "v1"
new_classes = ["MiroSync"]

[[migrations]]
tag = "v2"
new_classes = ["DataIngestor"]

[[migrations]]
tag = "v3"
new_classes = ["ManuscriptAggregator"]
