# ============================================

# Default target (avoids “Missing entry-point” when no env is specified)
name = "blogspro-upstox"
main = "api/upstox-worker.js"
compatibility_date = "2026-04-01"

# KV cache worker (bind CACHE_KV before deploy)
[env.kv-cache]
name = "blogspro-kv-cache"
main = "workers/kv-cache.js"
compatibility_date = "2026-04-01"

[env.kv-cache.kv_namespaces]
# Replace id with your KV namespace ID
bindings = [
  { binding = "CACHE_KV", id = "9caa7afdf7e94adb99cecf221275d63d" }
]

[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

# --- PULSE ORCHESTRATOR ---
[env.pulse]
name = "blogspro-pulse"
main = "scripts/pulse-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.pulse.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
FIREBASE_STORAGE_BUCKET = "blogspro-ai.firebasestorage.app"
BASE_URL = "https://blogspro.in"
PROJECT_DOMAIN = "blogspro.in"
GROQ_MODEL = "llama-3.3-70b-versatile"
GEMINI_MODEL = "gemini-1.5-pro"
MISTRAL_MODEL = "mistral-large-latest"
INNGEST_EVENT_KEY = "iyn6A_cYtMybjJhGswI7zr_CX6HkT3R_bCqepOty9yufd_ax_OfkE9RDsQ_8tyMvM6TvWoJDvLm6IREcyjoMTg"
INNGEST_SIGNING_KEY = "signkey-prod-da8bf4172979eda4d892588ea271764fc3989d474a260eddbbd846b5aab8406a"
SENTRY_DSN = "https://c75786fd93da9331cedca5e3ec8bd9cd@o4511069230530560.ingest.de.sentry.io/4511069332832336"

[[env.pulse.services]]
binding = "DATA_HUB"
service = "blogspro-data-hub"

[[env.pulse.services]]
binding = "RELEVANCE"
service = "blogspro-relevance"

[[env.pulse.services]]
binding = "AUDITOR"
service = "blogspro-auditor"

[[env.pulse.services]]
binding = "TEMPLATE_ENGINE"
service = "blogspro-templates"

[[env.pulse.services]]
binding = "SEO_MANAGER"
service = "blogspro-seo"

[[env.pulse.services]]
binding = "MIROFISH"
service = "blogspro-mirofish"

# Pulse consumes DOs from Miro-Sync
[[env.pulse.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSyncS"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "INGESTOR_DO"
class_name = "DataIngestorS"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregatorS"
script_name = "blogspro-miro-sync"

[[env.pulse.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "swarm_telemetry"

[env.pulse.triggers]
crons = [
  "0 * * * *",     # Hourly Pulse
  "0 4 * * *",     # Daily Pulse (4 AM UTC)
  "0 5 * * 1",     # Weekly Pulse (Monday 5 AM UTC)
  "0 6 1 * *"      # Monthly Pulse (1st of Month 6 AM UTC)
]

# --- NEWSLETTER WORKER ---
[env.newsletter]
name = "blogspro-newsletter"
main = "api/newsletter-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- MIROFISH WORKER ---
[env.mirofish]
name = "blogspro-mirofish"
main = "scripts/mirofish-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[[env.mirofish.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSyncS"
script_name = "blogspro-miro-sync"

# --- DATA HUB WORKER ---
[env.data-hub]
name = "blogspro-data-hub"
main = "scripts/data-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- RELEVANCE WORKER ---
[env.relevance]
name = "blogspro-relevance"
main = "scripts/relevance-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- AUDITOR WORKER ---
[env.auditor]
name = "blogspro-auditor"
main = "scripts/auditor-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- SEO MANAGER WORKER ---
[env.seo]
name = "blogspro-seo"
main = "scripts/seo-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- TEMPLATE ENGINE ---
[env.templates]
name = "blogspro-templates"
main = "scripts/template-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

# --- MIRO SYNC WORKER (Durable Object Provider) ---
[env.miro-sync]
name = "blogspro-miro-sync"
main = "scripts/miro-sync-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = [ "nodejs_compat" ]

[env.miro-sync.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
FIREBASE_STORAGE_BUCKET = "blogspro-ai.firebasestorage.app"

[env.miro-sync.durable_objects]
bindings = [
  { name = "MIRO_SYNC_DO", class_name = "MiroSyncS" },
  { name = "INGESTOR_DO", class_name = "DataIngestorS" },
  { name = "MANUSCRIPT_DO", class_name = "ManuscriptAggregatorS" }
]

migrations = [
  { tag = "v5_4_2_j_final", new_sqlite_classes = ["MiroSyncS", "DataIngestorS", "ManuscriptAggregatorS"] }
]

# --- UPSTOX MARKET PROXY ---
[env.upstox]
name = "blogspro-upstox"
main = "api/upstox-worker.js"
compatibility_date = "2024-02-15"
compatibility_flags = [ "nodejs_compat" ]

[env.upstox.vars]
# Environment-specific variables
FIREBASE_PROJECT_ID = "blogspro-ai"
