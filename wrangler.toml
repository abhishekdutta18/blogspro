# ============================================

# Default target (avoids "Missing entry-point" when no env is specified)
name = "blogspro-upstox"
main = "api/upstox-worker.js"
compatibility_date = "2026-04-01"
account_id = "b3f4edff1fdc616f329e7d7cb6698307"

# KV cache worker (bind CACHE_KV before deploy)
[env.kv-cache]
name = "blogspro-kv-cache"
main = "workers/kv-cache.js"
compatibility_date = "2026-04-01"

[[env.kv-cache.kv_namespaces]]
binding = "CACHE_KV"
id = "9caa7afdf7e94adb99cecf221275d63d"

[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

# --- PULSE ORCHESTRATOR ---
[env.pulse]
name = "blogspro-pulse"
main = "scripts/pulse-worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = [ "nodejs_compat" ]
minify = true

kv_namespaces = [
  { binding = "KV", id = "9caa7afdf7e94adb99cecf221275d63d" }
]

[env.pulse.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
FIREBASE_STORAGE_BUCKET = "blogspro-ai.firebasestorage.app"
BASE_URL = "https://blogspro.in"
PROJECT_DOMAIN = "blogspro.in"
SAMBANOVA_MODEL = "Meta-Llama-4-70B-Instruct"
CEREBRAS_MODEL = "llama-4-70b"
MISTRAL_MODEL = "mistral-large-latest"
INNGEST_EVENT_KEY = "iyn6A_cYtMybjJhGswI7zr_CX6HkT3R_bCqepOty9yufd_ax_OfkE9RDsQ_8tyMvM6TvWoJDvLm6IREcyjoMTg"
INNGEST_SIGNING_KEY = "signkey-prod-da8bf4172979eda4d892588ea271764fc3989d474a260eddbbd846b5aab8406a"
SENTRY_DSN = "https://c75786fd93da9331cedca5e3ec8bd9cd@o4511069230530560.ingest.de.sentry.io/4511069332832336"

[[env.pulse.services]]
binding = "DATA_HUB"
service = "blogspro-data-hub"

[[env.pulse.services]]
binding = "RELEVANCE"
service = "blogspro-relevance"

[[env.pulse.services]]
binding = "AUDITOR"
service = "blogspro-auditor"

[[env.pulse.services]]
binding = "TEMPLATE_ENGINE"
service = "blogspro-templates"

[[env.pulse.services]]
binding = "SEO_MANAGER"
service = "blogspro-seo"

[[env.pulse.services]]
binding = "MIROFISH"
service = "blogspro-mirofish"

# Pulse consumes DOs from Miro-Sync
[[env.pulse.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
class_name = "MiroSyncS"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "INGESTOR_DO"
class_name = "DataIngestorS"
script_name = "blogspro-miro-sync"

[[env.pulse.durable_objects.bindings]]
name = "MANUSCRIPT_DO"
class_name = "ManuscriptAggregatorS"
script_name = "blogspro-miro-sync"

[[env.pulse.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "swarm_telemetry"

[env.pulse.triggers]
crons = [
  "0 * * * *",     # Hourly Pulse
  "0 4 * * *",     # Daily Pulse (4 AM UTC)
  "0 5 * * 1",     # Weekly Pulse (Monday 5 AM UTC)
  "0 6 1 * *"      # Monthly Pulse (1st of Month 6 AM UTC)
]

# --- NEWSLETTER WORKER ---
[env.newsletter]
name = "blogspro-newsletter"
main = "api/newsletter-worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = [ "nodejs_compat" ]

# --- MIROFISH WORKER ---
[env.mirofish]
name = "blogspro-mirofish"
main = "scripts/mirofish-worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = [ "nodejs_compat" ]
minify = true

[env.mirofish.vars]
FIREBASE_PROJECT_ID = "blogspro-ai"
FIREBASE_STORAGE_BUCKET = "blogspro-ai.firebasestorage.app"

[[env.mirofish.durable_objects.bindings]]
name = "MIRO_SYNC_DO"
