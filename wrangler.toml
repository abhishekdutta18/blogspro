name = "blogspro-newsletter"
main = "api/newsletter-worker.js"
compatibility_date = "2024-02-15"
account_id = "b3f4edff1fdc616f329e7d7cb6698307"

[vars]
FIREBASE_PROJECT_ID = "blogspro-ai"

# Secrets - must be set via: wrangler secret put
# RESEND_API_KEY - Get from https://resend.com/api-keys
# NEWSLETTER_SECRET - Arbitrary string to authenticate frontend requests (use: openssl rand -base64 32)

# blogspro-upstox configuration
# Deploy with: wrangler deploy -c wrangler.upstox.toml (or separate file)
# For now, adding as a secondary environment or separate config is preferred for multiple workers.
