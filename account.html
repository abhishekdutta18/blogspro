<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — BlogsPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #080d1a; --navy2:  #0f1628; --navy3:  #1a2340;
      --gold:   #c9a84c; --gold2:  #f0cc6e; --cream:  #f5f0e8;
      --muted:  #8896b3; --border: rgba(201,168,76,0.2);
      --green:  #22c55e; --red: #ef4444;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', sans-serif;
    }
    body { background: var(--navy); color: var(--cream); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
 
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,13,26,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px;
    }
    .nav-brand { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--gold), var(--gold2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-link { font-size: 0.82rem; color: var(--muted); transition: color 0.2s; }
    .nav-link:hover { color: var(--gold); }
 
    .page { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
    .page-title { font-family: var(--serif); font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 3rem; }
 
    .grid { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; align-items: start; }
 
    .profile-card {
      background: var(--navy2); border: 1px solid var(--border);
      padding: 2rem; text-align: center; position: sticky; top: 90px;
    }
    .avatar-wrap { position: relative; display: inline-block; margin-bottom: 1.2rem; }
    .avatar {
      width: 90px; height: 90px; border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover; background: var(--navy3);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 2.2rem; font-weight: 700;
      color: var(--gold); overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .profile-name { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .profile-email { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; word-break: break-all; }
    .role-badge {
      display: inline-block; padding: 0.3rem 0.8rem; border-radius: 2px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    }
    .role-reader   { background: rgba(136,150,179,0.15); color: var(--muted); }
    .role-editor   { background: rgba(37,99,235,0.15);   color: #93c5fd; }
    .role-coauthor { background: rgba(201,168,76,0.15);  color: var(--gold); }
    .role-admin    { background: rgba(201,168,76,0.3);   color: var(--gold2); }
 
    .profile-bio { font-size: 0.82rem; color: var(--muted); margin-top: 1rem; line-height: 1.6; text-align: left; }
 
    .btn-logout-sm {
      width: 100%; margin-top: 1.5rem;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 0.6rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout-sm:hover { border-color: var(--red); color: #fca5a5; }
 
    .panels { display: flex; flex-direction: column; gap: 1.5rem; }
    .panel { background: var(--navy2); border: 1px solid var(--border); overflow: hidden; }
    .panel-header {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .panel-title { font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem; }
    .panel-icon { color: var(--gold); font-size: 1rem; }
    .panel-toggle { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
    .panel-toggle.open { transform: rotate(180deg); }
    .panel-body { padding: 1.5rem; display: none; }
    .panel-body.open { display: block; animation: fadeIn 0.2s ease; }
 
    .form-row { margin-bottom: 1.2rem; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .form-input, .form-textarea {
      width: 100%; background: var(--navy); border: 1px solid var(--border);
      color: var(--cream); padding: 0.8rem 1rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }
 
    .btn-save {
      background: var(--gold); color: var(--navy); border: none;
      padding: 0.85rem 2rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-save:hover { background: var(--gold2); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger {
      background: transparent; border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5; padding: 0.85rem 2rem; border-radius: 3px;
      font-family: var(--sans); font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
 
    .success-msg { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; padding: 0.75rem 1rem; border-radius: 3px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .error-msg   { background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.3);   color: #fca5a5; padding: 0.75rem 1rem; border-radius: 3px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
 
    .loading-ring { width: 15px; height: 15px; border: 2px solid rgba(8,13,26,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    @media(max-width:700px) { .grid { grid-template-columns: 1fr; } .profile-card { position: static; } }
  </style>
</head>
<body>
 
<nav>
  <a class="nav-brand" href="index.html"><img src="logo.svg" alt="BlogsPro" height="28"></a>
  <div class="nav-right">
    <a class="nav-link" href="index.html">← Ledger</a>
  </div>
</nav>
 
<div class="page">
  <div class="page-title">Identity Management</div>
  <div class="page-sub" id="pageSub">Loading terminal interface…</div>
 
  <div class="grid">
    <div>
      <div class="profile-card">
        <div class="avatar-wrap">
          <div class="avatar" id="avatarEl">
            <img id="avatarImg" src="" alt="" />
            <span id="avatarInitial">?</span>
          </div>
        </div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
        <span class="role-badge" id="profileRole">—</span>
        <p class="profile-bio" id="profileBio"></p>
        <button class="btn-logout-sm" onclick="doLogout()">Terminate Session</button>
      </div>
    </div>
 
    <div class="panels">
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('profile')">
          <div class="panel-title"><span class="panel-icon">👤</span> Profile Parameters</div>
          <span class="panel-toggle open" id="toggle-profile">▼</span>
        </div>
        <div class="panel-body open" id="body-profile">
          <form onsubmit="saveProfile(); return false;">
            <div class="success-msg" id="profileSuccess"></div>
            <div class="error-msg"   id="profileError"></div>
            <div class="form-row">
              <label class="form-label">Full Name</label>
              <input class="form-input" id="inputName" placeholder="Name" />
            </div>
            <div class="form-row">
              <label class="form-label">Photo URL</label>
              <input class="form-input" id="inputPhotoURL" placeholder="https://..." />
            </div>
            <div class="form-row">
              <label class="form-label">Biography</label>
              <textarea class="form-textarea" id="inputBio" placeholder="Description..."></textarea>
            </div>
            <button class="btn-save" id="btnSaveProfile" type="submit">
              <span>Synchronize Profile</span>
              <div class="loading-ring" id="profileRing"></div>
            </button>
          </form>
        </div>
      </div>
 
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('email')">
          <div class="panel-title"><span class="panel-icon">✉️</span> Routing Address</div>
          <span class="panel-toggle" id="toggle-email">▼</span>
        </div>
        <div class="panel-body" id="body-email">
          <form onsubmit="saveEmail(); return false;">
            <div class="success-msg" id="emailSuccess"></div>
            <div class="error-msg"   id="emailError"></div>
            <div class="form-row">
              <label class="form-label">New Email Entity</label>
              <input class="form-input" type="email" id="inputEmail" />
            </div>
            <button class="btn-save" id="btnSaveEmail" type="submit">
              <span>Update Routing</span>
              <div class="loading-ring" id="emailRing"></div>
            </button>
          </form>
        </div>
      </div>
 
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('password')">
          <div class="panel-title"><span class="panel-icon">🔒</span> Encryption Key</div>
          <span class="panel-toggle" id="toggle-password">▼</span>
        </div>
        <div class="panel-body" id="body-password">
          <form onsubmit="savePassword(); return false;">
            <div class="success-msg" id="passwordSuccess"></div>
            <div class="error-msg"   id="passwordError"></div>
            <div class="form-row">
              <label class="form-label">New Key</label>
              <input class="form-input" type="password" id="inputPass1" />
            </div>
            <div class="form-row">
              <label class="form-label">Confirm Key</label>
              <input class="form-input" type="password" id="inputPass2" />
            </div>
            <button class="btn-save" id="btnSavePass" type="submit">
              <span>Rotate Key</span>
              <div class="loading-ring" id="passRing"></div>
            </button>
          </form>
        </div>
      </div>
 
      <div class="panel">
        <div class="panel-header" onclick="togglePanel('danger')" style="border-color:rgba(239,68,68,0.2)">
          <div class="panel-title"><span class="panel-icon" style="color:#ef4444">⚠️</span> Termination Protocol</div>
          <span class="panel-toggle" id="toggle-danger">▼</span>
        </div>
        <div class="panel-body" id="body-danger">
          <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1.2rem">Deletes permanent identity record from the ledger.</p>
          <button class="btn-danger" onclick="deleteAccount()">Execute Termination</button>
        </div>
      </div>
    </div>
  </div>
</div>
 
<script type="module">
  import { api } from './js/services/api.js';
 
  let currentUser = null;
  let userData    = {};
 
  async function init() {
    try {
      const res = await api.auth.me();
      if (!res.authenticated) { window.location.href = 'login.html'; return; }
      currentUser = res.user;
      await loadProfile(currentUser);
    } catch (err) { window.location.href = 'login.html'; }
  }
  init();
 
  async function loadProfile(user) {
    try {
      const snap = await api.data.get('users', user.uid);
      userData = snap || { name: user.displayName || '', email: user.email || '', bio: '', photoURL: user.photoURL || '', role: 'reader' };
 
      document.getElementById('profileName').textContent  = userData.name  || 'Incognito';
      document.getElementById('profileEmail').textContent = userData.email || user.email || '';
      document.getElementById('pageSub').textContent      = `Institutional identity managed.`;
      if (userData.bio) document.getElementById('profileBio').textContent = userData.bio;
 
      const initial = (userData.name || user.email || '?')[0].toUpperCase();
      document.getElementById('avatarInitial').textContent = initial;
      if (userData.photoURL) {
        const img = document.getElementById('avatarImg');
        img.src = userData.photoURL; img.style.display = 'block';
        document.getElementById('avatarInitial').style.display = 'none';
      }
 
      const role = userData.role || 'reader';
      const badge = document.getElementById('profileRole');
      badge.textContent = role.toUpperCase();
      badge.className   = `role-badge role-${role}`;
 
      document.getElementById('inputName').value     = userData.name     || '';
      document.getElementById('inputBio').value      = userData.bio      || '';
      document.getElementById('inputPhotoURL').value = userData.photoURL || '';
      document.getElementById('inputEmail').value    = userData.email    || user.email || '';
    } catch(err) { console.error(err); }
  }
 
  window.saveProfile = async () => {
    const name = document.getElementById('inputName').value.trim();
    const bio = document.getElementById('inputBio').value.trim();
    const photoURL = document.getElementById('inputPhotoURL').value.trim();
    setBtn('btnSaveProfile','profileRing', true); hideMsg('profileError'); hideMsg('profileSuccess');
    try {
      await api.data.update('users', currentUser.uid, { name, bio, photoURL, updatedAt: new Date().toISOString() });
      showMsg('profileSuccess', '✓ Parameters synchronized.');
      loadProfile(currentUser);
    } catch(e) { showMsg('profileError', 'Sync failure.'); }
    setBtn('btnSaveProfile','profileRing', false);
  };
 
  window.saveEmail = async () => {
    const email = document.getElementById('inputEmail').value.trim();
    setBtn('btnSaveEmail','emailRing', true); hideMsg('emailError'); hideMsg('emailSuccess');
    try {
      await api.auth.updateEmail(email);
      await api.data.update('users', currentUser.uid, { email, updatedAt: new Date().toISOString() });
      showMsg('emailSuccess', '✓ Routing updated.');
    } catch(e) { showMsg('emailError', 'Routing error.'); }
    setBtn('btnSaveEmail','emailRing', false);
  };
 
  window.savePassword = async () => {
    const p1 = document.getElementById('inputPass1').value;
    const p2 = document.getElementById('inputPass2').value;
    if (p1.length < 6 || p1 !== p2)  { showMsg('passwordError','Integrity check failed.'); return; }
    setBtn('btnSavePass','passRing', true); hideMsg('passwordError'); hideMsg('passwordSuccess');
    try {
      await api.auth.updatePassword(p1);
      showMsg('passwordSuccess', '✓ Key rotated.');
    } catch(e) { showMsg('passwordError', 'Rotation error.'); }
    setBtn('btnSavePass','passRing', false);
  };
 
  window.deleteAccount = async () => {
    if (!confirm('Execute termination protocol?')) return;
    try {
      await api.auth.deleteAccount();
      await api.data.delete('users', currentUser.uid);
      window.location.href = 'index.html';
    } catch(e) { alert('Termination failed.'); }
  };
 
  window.togglePanel = (id) => {
    const body = document.getElementById(`body-${id}`);
    const toggle = document.getElementById(`toggle-${id}`);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    toggle.classList.toggle('open', !isOpen);
  };
 
  function setBtn(id, rid, on) {
    const b = document.getElementById(id); const r = document.getElementById(rid);
    if (b) b.disabled = on; if (r) r.style.display = on ? 'block' : 'none';
  }
  function showMsg(id, m) { const e = document.getElementById(id); if (e) { e.textContent = m; e.style.display = 'block'; } }
  function hideMsg(id) { const e = document.getElementById(id); if (e) e.style.display = 'none'; }
  window.doLogout = async () => { await api.auth.logout(); window.location.href = 'index.html'; };
</script>
</body>
</html>
