<!DOCTYPE html>
<html>
<head>
  <!-- Sentry Error Tracking -->
  <script src="https://browser.sentry-cdn.com/10.44.0/bundle.min.js" crossorigin="anonymous"></script>
  <script>
    Sentry.init({
      dsn: "https://c75786fd93da9331cedca5e3ec8bd9cd@o4511069230530560.ingest.de.sentry.io/4511069332832336",
      environment: window.location.hostname === "blogspro.in" ? "production" : "development",
      release: "blogspro@2026-03-25",
      integrations: [ Sentry.consoleIntegration({ levels: ['error', 'warn'] }) ],
      sampleRate: 1.0,
      tracesSampleRate: 0.1,
      maxBreadcrumbs: 30,
      attachStacktrace: true,
      ignoreErrors: [
        "ResizeObserver loop limit exceeded",
        "ResizeObserver loop completed with undelivered notifications",
        "Network request failed",
        "Failed to fetch"
      ]
    });
    window.setSentryUser = function(u) { Sentry.setUser(u); };
    window.trackEvent   = function(name, data) {
      Sentry.addBreadcrumb({ message: name, data: data, level: "info" });
    };
  </script>
  <meta charset="UTF-8" />
  <title>Sitemap Generator — BlogsPro</title>
  <style>
    body { font-family: monospace; background: #080d1a; color: #8896b3; padding: 2rem; font-size: 0.85rem; }
    h2   { color: #c9a84c; margin-bottom: 1rem; }
    pre  { background: #0f1628; padding: 1.5rem; border: 1px solid rgba(201,168,76,0.2); white-space: pre-wrap; word-break: break-all; }
    button { background: #c9a84c; color: #080d1a; border: none; padding: 0.6rem 1.5rem; cursor: pointer; font-weight: 700; margin-bottom: 1rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h2>BlogsPro — Sitemap Generator</h2>
  <p style="margin-bottom:1rem">This generates your sitemap.xml dynamically from Firestore. Copy the output and save it as <code>sitemap.xml</code> in your repo.</p>
  <button onclick="generate()">Generate Sitemap</button>
  <pre id="output">Click Generate to build sitemap…</pre>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey:"AIzaSyDEUQApHIitL89yXcFq6vEY8yDKZBQYWBY",
    authDomain:"blogspro-ai.firebaseapp.com",
    projectId:"blogspro-ai",
    storageBucket:"blogspro-ai.firebasestorage.app",
    messagingSenderId:"940428277283",
    appId:"1:940428277283:web:d3bb414f0992718ca76396"
  };
 
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  function escXml(v = '') {
    return String(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');
  }
 
  window.generate = async () => {
    document.getElementById('output').textContent = 'Generating…';
    try {
      // Important: must query only published posts so Firestore rules allow list reads.
      const snap  = await getDocs(query(
        collection(db, 'posts'),
        where('published', '==', true)
      ));
      const posts = snap.docs
        .map(d => ({ id: d.id, ...d.data() }));
 
      const base  = 'https://blogspro.in';
      const today = new Date().toISOString().split('T')[0];
 
      const staticPages = [
        { url: `${base}/`,              priority: '1.0', freq: 'daily' },
        { url: `${base}/index.html`,    priority: '0.9', freq: 'daily' },
        { url: `${base}/login.html`,    priority: '0.3', freq: 'monthly' },
        { url: `${base}/register.html`, priority: '0.3', freq: 'monthly' },
      ];
 
      const postPages = posts.map(p => ({
        url:      `${base}/post.html?id=${p.id}`,
        lastmod:  p.updatedAt?.toDate?.()?.toISOString().split('T')[0] || today,
        priority: '0.8',
        freq:     'weekly'
      }));
 
      const allPages = [...staticPages, ...postPages];
 
      const xml = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${allPages.map(p => `  <url>
    <loc>${escXml(p.url)}</loc>
    ${p.lastmod ? `<lastmod>${p.lastmod}</lastmod>` : `<lastmod>${today}</lastmod>`}
    <changefreq>${p.freq}</changefreq>
    <priority>${p.priority}</priority>
  </url>`).join('\n')}
</urlset>`;
 
      document.getElementById('output').textContent = xml;
    } catch(e) {
      document.getElementById('output').textContent = 'Error: ' + e.message;
    }
  };
</script>
</body>
</html>
